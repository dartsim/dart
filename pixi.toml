], env = { DART_VERBOSE = "OFF" }, args = [
  { arg = "dartpy", default = "ON" },
  { arg = "build_profile", default = "ON" },
  { arg = "profile_builtin", default = "ON" },
  { arg = "profile_tracy", default = "ON" },
] }

build-tests = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE={{ build_type }}
CMAKE_BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE} python scripts/cmake_build.py --target tests
""",
], depends-on = [
  { task = "config", args = [
    "{{ dartpy }}",
    "{{ build_type }}",
  ] },
], args = [
  { arg = "dartpy", default = "ON" },
  { arg = "build_type", default = "Release" },
] }

voxblox-bootstrap = { cmd = ["bash", "-lc", """
set -euo pipefail
VOXBLOX_ROOT=${VOXBLOX_ROOT:-/home/js/dev/physics/voxblox}
VOXBLOX_WS=${VOXBLOX_WS:-/home/js/dev/physics/voxblox_ws}
VOXBLOX_GIT_URL=${VOXBLOX_GIT_URL:-https://github.com/ethz-asl/voxblox.git}

if [ -e "$VOXBLOX_ROOT" ] && [ ! -d "$VOXBLOX_ROOT/.git" ]; then
  echo "VOXBLOX_ROOT exists but is not a git repo: $VOXBLOX_ROOT" >&2
  exit 1
fi

if [ ! -d "$VOXBLOX_ROOT/.git" ]; then
  git clone --recursive "$VOXBLOX_GIT_URL" "$VOXBLOX_ROOT"
fi

mkdir -p "$VOXBLOX_WS/src"
if [ -e "$VOXBLOX_WS/src/voxblox" ]; then
  rm -rf "$VOXBLOX_WS/src/voxblox"
fi
ln -s "$VOXBLOX_ROOT" "$VOXBLOX_WS/src/voxblox"
echo "Voxblox cloned. ROS/catkin build is not run here."
echo "If you need a build, use a ROS workspace and catkin_make."
"""] }

build-examples = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE={{ build_type }}
CMAKE_BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE} python scripts/cmake_build.py --target examples
""",
], depends-on = [
  { task = "config", args = [
    "{{ dartpy }}",
    "{{ build_type }}",
  ] },
], args = [
  { arg = "dartpy", default = "ON" },
  { arg = "build_type", default = "Release" },
