[workspace]
name = "DART"
version = "6.19.4"
description = "Dynamic Animation and Robotics Toolkit"
authors = ["Jeongseok Lee <jslee02@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
benchmark = ">=1.9.3,<2"
black = ">=25.1.0,<26"
clang-format = ">=14.0.0,<15"
cmake = ">=4.0.2,<4.3.4"
codespell = ">=2.4.1,<3"
doxygen = ">=1.13.2,<2"
gersemi = ">=0.24.0,<0.25"
gtest = ">=1.17.0,<2"
isort = ">=6.0.1,<7"
jinja2 = ">=3.1.2"
myst-parser = "*"
ninja = ">=1.12.1,<2"
pip = ">=25.1.1,<26"
pipx = ">=1.7.1,<2"
pkg-config = ">=0.29.2,<0.30"
pytest = ">=8.3.5,<9"
sccache = ">=0.15.0,<0.16"
setuptools = ">=80.1.0,<81"
sphinx = "*"
sphinx-copybutton = "*"
sphinx-intl = "*"
sphinx_rtd_theme = "*"
sphinx-tabs = "*"
taplo = ">=0.9.0,<1"
wheel = ">=0.45.1,<0.46"
assimp = ">=5.4.3,<7"
bullet-cpp = ">=3.25,<4"
console_bridge = ">=1.0.2,<2"
eigen = ">=3.4.0,<4"
fcl = ">=0.7.0,<0.8"
fmt = ">=11.1.4,<12"
imgui = ">=1.91.9,<2"
libboost-devel = ">=1.86.0,<2"
libode = ">=0.16.5,<0.17"
numpy = ">=2.2.5,<3"
octomap = ">=1.10.0,<2"
openscenegraph = ">=3.6.5,<4"
pybind11 = ">=3.0.3,<4"
spdlog = ">=1.15.3,<2"
tinyxml2 = ">=11.0.0,<12"
urdfdom = ">=4.0.1,<5"

[tasks]
clean = { cmd = "rm -rf build && rm -rf .deps && rm -rf .pixi && rm pixi.lock" }

config = { cmd = """
    cmake \
        -G Ninja \
        -S . \
        -B build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
        -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
        -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
        -DDART_DISABLE_COMPILER_CACHE=$DART_DISABLE_COMPILER_CACHE \
        -DDART_BUILD_DARTPY=ON \
        -DDART_BUILD_PROFILE=ON \
        -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
        -DDART_USE_SYSTEM_GOOGLETEST=ON \
        -DDART_USE_SYSTEM_IMGUI=ON \
        -DDART_USE_SYSTEM_PYBIND11=ON \
        -DDART_USE_SYSTEM_TRACY=ON \
        -DDART_VERBOSE=$DART_VERBOSE
""", env = { DART_VERBOSE = "OFF", BUILD_TYPE = "Release" } }

lint-cpp = { cmd = """
    cmake \
    --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
    --target format
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

lint-py = { cmd = """
    black . --exclude '\\..*' \
    && isort . --skip-glob '.*'
""", depends-on = ["config"] }

lint-cmake = { cmd = ["python", "scripts/lint_cmake.py"] }

lint-toml = { cmd = ["bash", "-lc", """
set -euo pipefail
python - <<'PY'
import pathlib
import shutil
import subprocess
import time

skip_dirs = {'.pixi', 'build', 'external', 'node_modules'}
root = pathlib.Path('.')
toml_files = []
for path in root.rglob('*.toml'):
    if any(part in skip_dirs for part in path.parts):
        continue
    toml_files.append(path)

if not toml_files:
    raise SystemExit(0)

timestamp = time.strftime('%Y%m%d%H%M%S')
backup_dir = root / '.pixi' / 'lint-toml-backups' / timestamp
for path in toml_files:
    dest = backup_dir / path
    dest.parent.mkdir(parents=True, exist_ok=True)
    shutil.copy2(path, dest)

subprocess.run(['taplo', 'fmt', *map(str, toml_files)], check=True)
PY
"""] }

lint-spell = { cmd = "codespell --write-changes --config .codespellrc" }

lint = { depends-on = [
  "lint-spell",
  "lint-cpp",
  "lint-cmake",
  "lint-py",
  "lint-toml",
] }

check-lint-cpp = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target check-format
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

check-lint-py = { cmd = """
    black . --check --exclude '\\..*' \
    && isort . --check --skip-glob '.*'
""", depends-on = ["config"] }

check-lint-cmake = { cmd = ["python", "scripts/lint_cmake.py", "--check"] }

check-lint-spell = { cmd = "codespell --config .codespellrc" }

check-lint = { depends-on = [
  "check-lint-cpp",
  "check-lint-cmake",
  "check-lint-py",
  "check-lint-spell",
  "check-ai-commands",
  "check-ai-infra",
] }

# Fast compatibility alias retained for older local workflows.
check-lint-quick = { depends-on = ["check-agent-hook"] }

# One-time setup: install the pre-commit git hook that runs check-agent-hook.
install-hooks = { cmd = "python scripts/install_git_hooks.py" }

sync-ai-commands = { cmd = "python scripts/sync_ai_commands.py" }
check-ai-commands = { cmd = "python scripts/sync_ai_commands.py --check" }
ai-setup = { cmd = "python scripts/setup_ai.py" }
ai-doctor = { cmd = "python scripts/check_ai_infrastructure.py --doctor" }
check-agent-hook = { cmd = "python scripts/check_agent_hook.py --profile staged" }
check-ai-infra = { cmd = "python scripts/check_ai_infrastructure.py --check" }
exercise-agent-scenarios = { cmd = "python scripts/check_ai_infrastructure.py --scenarios" }
test-ai-infra = { cmd = "python -m pytest tests/test_sync_ai_commands.py tests/test_ai_infrastructure.py tests/test_install_git_hooks.py -q" }

# ssik is an optional, PyPI-only analytical IK solver used only by the
# ssik_ik_gui scene (dart-demos, C++) and the ssik_analytical_ik (Python)
# example. It is not a dependency of DART or dartpy; install it on demand
# with this convenience task.
install-ssik = { cmd = "python -m pip install 'ssik>=2.3.0'" }

build = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -j \
        --target all
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

build-tests = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -j \
        --target tests
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

build-py = { cmd = "python scripts/pixi_build_py.py -DDART_USE_SYSTEM_IMGUI=ON -DDART_USE_SYSTEM_PYBIND11=ON" }

wheel-build-core = { cmd = "python scripts/wheel_build.py {{ use_system_imgui }}", args = [
  { arg = "use_system_imgui", default = "ON" },
] }

wheel-repair-linux-core = { cmd = """
    auditwheel repair dist/dartpy-*-{{ python_tag }}-*-linux_x86_64.whl -w dist/ &&
    rm dist/dartpy-*-{{ python_tag }}-*-linux_x86_64.whl
""", args = [
  { arg = "python_tag" },
], env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" } }

wheel-repair-macos-core = { cmd = """
    delocate-wheel --require-archs {{ arch }} \
        -w dist/ \
        -v dist/dartpy-*-{{ python_tag }}-*-macosx_*_{{ arch }}.whl
""", args = [
  { arg = "python_tag" },
  { arg = "arch" },
], env = { DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$PIXI_PROJECT_ROOT/.pixi/envs/$PIXI_ENVIRONMENT_NAME/lib", DELOCATE_LIBRARY_PATH = "$CONDA_PREFIX/lib:$PIXI_PROJECT_ROOT/.pixi/envs/$PIXI_ENVIRONMENT_NAME/lib", CONDA_PREFIX = "$CONDA_PREFIX:$PIXI_PROJECT_ROOT/.pixi/envs/$PIXI_ENVIRONMENT_NAME" } }

wheel-repair-windows-core = { cmd = """
    rm -rf dist/repaired &&
    delvewheel repair dist/dartpy-*-{{ python_tag }}-*-win_amd64.whl -w dist/repaired &&
    rm dist/dartpy-*-{{ python_tag }}-*-win_amd64.whl &&
    mv dist/repaired/*.whl dist/ &&
    rm -rf dist/repaired
""", args = [
  { arg = "python_tag" },
] }

wheel-verify-core = { cmd = """
python scripts/verify_version.py dist/dartpy-*-{{ python_tag }}-*.whl &&
python scripts/verify_wheel.py dist/dartpy-*-{{ python_tag }}-*.whl
""", args = [{ arg = "python_tag" }], env = { PYTHONIOENCODING = "utf-8" } }

wheel-test-core = { cmd = "python scripts/test_wheel.py dist/dartpy-*-{{ python_tag }}-*.whl", args = [
  { arg = "python_tag" },
], env = { PYTHONIOENCODING = "utf-8" } }

build-py-dev = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -j \
        --target dartpy
""", depends-on = ["config-py"], env = { BUILD_TYPE = "Release" } }

config-py = { cmd = """
    cmake \
        -G Ninja \
        -S . \
        -B build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
        -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
        -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
        -DDART_DISABLE_COMPILER_CACHE=$DART_DISABLE_COMPILER_CACHE \
        -DDART_BUILD_DARTPY=ON \
        -DDART_BUILD_PROFILE=ON \
        -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
        -DDART_USE_SYSTEM_GOOGLETEST=ON \
        -DDART_USE_SYSTEM_IMGUI=ON \
        -DDART_USE_SYSTEM_PYBIND11=ON \
        -DDART_USE_SYSTEM_TRACY=ON \
        -DDART_VERBOSE=$DART_VERBOSE
""", env = { DART_VERBOSE = "OFF", BUILD_TYPE = "Release" } }

py-ex = { cmd = "python python/examples/{{ example }}/main.py", depends-on = [
  "build-py-dev",
], args = [
  { arg = "example", default = "hello_world" },
], env = { BUILD_TYPE = "Release", PYTHONPATH = "build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/python/dartpy" } }

py-ex-hello-world = { depends-on = [
  { task = "py-ex", args = [
    "hello_world",
  ] },
] }

# py-demos: the consolidated dartpy scene catalog (python/examples/demos),
# run as `python -m examples.demos` so `examples` resolves as a package;
# cwd is the `python` directory (the parent of `examples`), mirroring the
# WORKING_DIRECTORY used by the CMake py_example_demos target. PYTHONPATH
# must be absolute (via $PIXI_PROJECT_ROOT) since it is resolved relative to
# this task's cwd, not the workspace root that the other build/$BUILD_TYPE
# paths above are written against.
py-demos = { cmd = "python -m examples.demos", cwd = "python", depends-on = [
  "build-py-dev",
], env = { BUILD_TYPE = "Release", PYTHONPATH = "$PIXI_PROJECT_ROOT/build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/python/dartpy" } }

test = { cmd = """
    ctest \
        --test-dir build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --output-on-failure
""", depends-on = ["build-tests"], env = { BUILD_TYPE = "Release" } }

test-eigen-overalignment = { cmd = "python scripts/test_eigen_overalignment.py" }

test-py = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -j \
        --target pytest
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

test-all = { cmd = """
    cmake --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE -j --target ALL
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

config-asan = { cmd = """
    cmake \
        -G Ninja \
        -S . \
        -B build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
        -DCMAKE_BUILD_TYPE=RelWithDebInfo \
        -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
        -DDART_DISABLE_COMPILER_CACHE=$DART_DISABLE_COMPILER_CACHE \
        -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
        -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
        -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
        -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
        -DCMAKE_DISABLE_FIND_PACKAGE_OpenSceneGraph=TRUE \
        -DDART_BUILD_DARTPY=OFF \
        -DDART_BUILD_GUI_OSG=OFF \
        -DDART_BUILD_PROFILE=OFF \
        -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
        -DDART_USE_SYSTEM_GOOGLETEST=ON \
        -DDART_USE_SYSTEM_IMGUI=ON \
        -DDART_VERBOSE=$DART_VERBOSE
""", env = { DART_VERBOSE = "OFF", BUILD_TYPE = "asan" } }

build-asan = { cmd = """
    cmake --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE -j --target tests
""", depends-on = ["config-asan"], env = { BUILD_TYPE = "asan" } }

test-asan = { cmd = """
    ctest \
        --test-dir build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --output-on-failure
""", depends-on = [
  "build-asan",
], env = { BUILD_TYPE = "asan", ASAN_OPTIONS = "detect_leaks=0" } }

config-coverage = { cmd = """
    cmake \
        -G Ninja \
        -S . \
        -B build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
        -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
        -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
        -DDART_DISABLE_COMPILER_CACHE=$DART_DISABLE_COMPILER_CACHE \
        -DDART_BUILD_PROFILE=OFF \
        -DDART_CODECOV=ON \
        -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
        -DDART_USE_SYSTEM_GOOGLETEST=ON \
        -DDART_USE_SYSTEM_IMGUI=ON \
        -DDART_USE_SYSTEM_TRACY=ON \
        -DDART_VERBOSE=$DART_VERBOSE
""", env = { DART_VERBOSE = "OFF", BUILD_TYPE = "Debug" } }

# Coverage instrumentation (Debug + DART_CODECOV) makes tests run several times
# slower, so raise the per-test timeout above CTest's 1500s default to keep slow
# regression tests (e.g. test_Issue1193, ~1350s here) from flaking on timeout.
build-coverage = { cmd = """
    cmake --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE -j --target all tests \
    && ctest \
        --output-on-failure \
        --parallel 4 \
        --timeout 3000 \
        --test-dir build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE
""", depends-on = [
  "config-coverage",
], env = { BUILD_TYPE = "Debug" } }

# Captures coverage from the .gcda data produced by a prior `build-coverage`
# run (the CI coverage job runs `build-coverage` then `coverage-report` as
# separate steps). It intentionally does NOT depend on `build-coverage` so the
# test suite is not re-run a second time just to regenerate the report; run
# `pixi run build-coverage` first when invoking this standalone.
# Note: --rc flag is needed for lcov compatibility with gcc 13+
coverage-report = { cmd = """
    lcov \
        --capture \
        --directory build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --output-file coverage.info \
        --rc geninfo_unexecuted_blocks=1 \
    && lcov \
        --remove coverage.info \
        '/usr/*' \
        '*/.deps/*' \
        '*/tests/*' \
        '*/examples/*' \
        '*/tutorials/*' \
        --output-file coverage.info \
    && lcov --list coverage.info
""", env = { BUILD_TYPE = "Debug" } }

ex = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target {{ example }} \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/bin/{{ example }}
""", depends-on = [
  "config",
], args = [
  { arg = "example", default = "hello_world" },
], env = { BUILD_TYPE = "Release" } }

ex-hello-world = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target hello_world \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/bin/hello_world
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

# demos: the consolidated dart-demos scene catalog (examples/demos).
demos = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target dart-demos \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/bin/dart-demos
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

bm = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target BM_INTEGRATION_$EXE \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/bin/BM_INTEGRATION_$EXE
""", depends-on = ["config"], env = { EXE = "empty", BUILD_TYPE = "Release" } }

bm-boxes = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target BM_INTEGRATION_boxes \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/bin/BM_INTEGRATION_boxes
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

bm-boxes-headless = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target boxes_headless \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/tests/benchmark/integration/boxes_headless {{ dim }} {{ steps }} {{ checkpoint }}
""", depends-on = [
  "config",
], args = [
  { arg = "dim", default = "8" },
  { arg = "steps", default = "2000" },
  { arg = "checkpoint", default = "500" },
], env = { BUILD_TYPE = "Release" } }

# Off-screen still capture of a dart-demos scene via the dart-gui-osg
# OffscreenViewer helper. On a headless host (no X server) prefix with
# xvfb-run, e.g. `xvfb-run -a -s '-screen 0 1280x1024x24' pixi run capture`.
# width/height set the off-screen render size.
capture = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target dart-demos \
        --parallel \
    && ./build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/bin/dart-demos \
        --scene {{ scene }} --headless --shot {{ out }} --width {{ width }} --height {{ height }}
""", depends-on = [
  "config",
], args = [
  { arg = "scene", default = "sleeping" },
  { arg = "out", default = "capture.png" },
  { arg = "width", default = "640" },
  { arg = "height", default = "480" },
], env = { BUILD_TYPE = "Release" } }

# Agent-time image verification for headless captures (pair with `capture`).
# image-verdict emits a machine-readable JSON verdict (non-blank, optional
# golden diff); image-golden manages golden baselines; image-sheet assembles a
# labeled contact sheet. Stdlib-only (numpy optional, for SSIM).
image-verdict = { cmd = ["python", "scripts/image_verdict.py"] }

image-golden = { cmd = ["python", "scripts/image_golden.py"] }

image-sheet = { cmd = ["python", "scripts/image_sheet.py"] }

image-compose = { cmd = ["python", "scripts/image_compose.py"] }

evidence-select = { cmd = ["python", "scripts/evidence_select.py"] }

evidence-publish = { cmd = ["python", "scripts/evidence_publish.py"] }

# Deterministic headless capture with active camera control (view-quality
# scored auto viewpoints, focus framing, turntable/motion) and engine-rendered
# core OSG debug layers (contacts, frames, velocities, trajectories, labels).
# Needs a GLX-capable X server; see docs/ai/verification.md.
agent-capture = { cmd = [
  "python",
  "scripts/agent_capture.py",
], depends-on = [
  "build-py-dev",
], env = { BUILD_TYPE = "Release", PYTHONPATH = "$PIXI_PROJECT_ROOT/build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/python/dartpy:$PIXI_PROJECT_ROOT/scripts" } }

# Claim-tied text/geometry and engine-rendered DebugOverlay regressions. The
# rendered case is non-skippable whenever DISPLAY is set; CI runs it under Xvfb.
test-agent-debug-overlay = { cmd = [
  "python",
  "-m",
  "pytest",
  "python/tests/unit/gui/test_agent_debug_overlay.py::test_contacts_layer_marks_points_and_normals",
  "python/tests/unit/gui/test_agent_debug_overlay.py::test_engine_rendered_overlay_changes_pixels",
  "python/tests/unit/gui/test_agent_capture.py::test_run_capture_smoke_writes_stills_and_sidecar",
  "python/tests/unit/gui/test_agent_capture.py::test_run_capture_debug_layers_change_pixels_end_to_end",
  "-q",
], depends-on = [
  "build-py-dev",
], env = { BUILD_TYPE = "Release", PYTHONPATH = "$PIXI_PROJECT_ROOT/build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE/python/dartpy:$PIXI_PROJECT_ROOT/scripts" } }

