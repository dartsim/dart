tracy-build = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
DART_TRACY_CMAKE_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp
DART_TRACY_SRC_DIR=${DART_TRACY_CMAKE_DIR}/_deps/tracy-src/profiler
DART_TRACY_BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/tracy-profiler
DART_TRACY_BIN=${DART_TRACY_BUILD_DIR}/Release/tracy-profiler.exe
DART_TRACY_VERSION=0.13.1
if [ ! -d "${DART_TRACY_SRC_DIR}" ]; then
  echo "Tracy source was not fetched. Run DART_PROFILE_TRACY=ON pixi run config." >&2
  exit 1
fi
DART_TRACY_STAMP=${DART_TRACY_BUILD_DIR}/.dart-tracy-version
DART_TRACY_BUILT_VERSION=""
if [ -f "${DART_TRACY_STAMP}" ]; then
  IFS= read -r DART_TRACY_BUILT_VERSION < "${DART_TRACY_STAMP}"
fi
if [ -x "${DART_TRACY_BIN}" ] \
  && [ "${DART_TRACY_BUILT_VERSION}" = "${DART_TRACY_VERSION}" ] \
  && [ "${DART_TRACY_REBUILD:-OFF}" != "ON" ]; then
  echo "Tracy GUI client ${DART_TRACY_VERSION} is already built at ${DART_TRACY_BIN}."
  exit 0
fi
rm -rf "${DART_TRACY_BUILD_DIR}"
DART_WINDOWS_CMAKE_GENERATOR=${DART_WINDOWS_CMAKE_GENERATOR:-Visual Studio 18 2026}
cmake \
  -S "${DART_TRACY_SRC_DIR}" \
  -B "${DART_TRACY_BUILD_DIR}" \
  -G "${DART_WINDOWS_CMAKE_GENERATOR}" \
  -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
  -DNO_PARALLEL_STL=ON \
  -DNO_ISA_EXTENSIONS=ON
cmake --build "${DART_TRACY_BUILD_DIR}" --config Release --target tracy-profiler
printf "%s\n" "${DART_TRACY_VERSION}" > "${DART_TRACY_STAMP}"
""",
], depends-on = [
  { task = "config", args = [
    "ON",
    "ON",
    "ON",
    "ON",
  ] },
] }

tracy = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
DART_TRACY_BIN=build/$PIXI_ENVIRONMENT_NAME/tracy-profiler/Release/tracy-profiler.exe
if [ ! -x "${DART_TRACY_BIN}" ]; then
  echo "Tracy GUI client was not built; building it now." >&2
  pixi run tracy-build
fi
if [ ! -x "${DART_TRACY_BIN}" ]; then
  echo "Tracy GUI client was not built at ${DART_TRACY_BIN}." >&2
  exit 1
fi
export TRACY_DPI_SCALE=${TRACY_DPI_SCALE:-1}
exec "${DART_TRACY_BIN}" "$@"
""",
  "tracy",
] }

#============================
# Feature: Collision Reference
#============================
#
# Optional reference engines for native collision correctness tests and
# comparative benchmarks. These packages are intentionally not part of the base
# environment because normal DART builds should use built-in collision only.
#
# Usage:
#   pixi run -e collision-reference config
#   pixi run -e collision-reference -- cmake --build build/collision-reference/cpp/Release --target test_reference_backends
#

[feature.collision-reference]
