sync-ai-commands = { cmd = ["python", "scripts/sync_ai_commands.py"] }
check-ai-commands = { cmd = [
  "python",
  "scripts/sync_ai_commands.py",
  "--check",
] }

check-lint = { depends-on = [
  "check-lint-cpp",
  "check-lint-simulation",
  "check-lint-collision-native",
  "check-lint-cmake",
  "check-lint-py",
  "check-lint-yaml",
  "check-lint-toml",
  "check-lint-md",
  "check-lint-rst",
  "check-lint-spell",
  "check-collision-runtime-isolation",
  "audit-collision-compat-facades",
