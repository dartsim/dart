# ---------------------------------------------------------------------------
# Tiered local verification. See docs/design/local_verification_pipeline.md.
# Naming: <verb>[-<tier>]; tiers are monotonic supersets quick < (bare) < full.
#   verb: build | test | verify (lint+build+test gate) | bench
#   tier: -quick (Tier 0 inner loop) | bare (Tier 1 pre-commit) | -full (Tier 2)
# Environment stays a `-e` flag; subsystem scope stays `<verb>-<scope>`.
# ---------------------------------------------------------------------------

# Tier 2 — authoritative gate: full build (incl Debug/examples/docs) + all tests.
verify-full = { cmd = "python scripts/test_all.py" }
test-all = { depends-on = ["verify-full"] }          # backward-compatible alias

# Tier 0 — inner loop: fast lint subset + fast unit tests (long poles skipped).
check-lint-quick = { depends-on = [
  "check-lint-cpp",
  "check-lint-py",
  "check-docs-policy",
  "check-api-boundaries",
  "check-dart7-promotion-surface",
  "check-collision-runtime-isolation",
] }
test-quick = { cmd = "python scripts/run_cpp_test.py --quick", depends-on = [
  "config",
] }
verify-quick = { depends-on = ["check-lint-quick", "test-quick"] }

# Tier 1 — pre-commit default: lint + Release lib/tests + simulation-quick + python.
# Builds only the test targets (not examples/tutorials/docs/Debug) to stay lean.
test-core = { cmd = "python scripts/ctest_tier.py -LE simulation", depends-on = [
  { task = "build-tests", args = [
    "ON",
    "Release",
  ] },
] }
test-simulation-quick = { cmd = "python scripts/ctest_tier.py -L '^simulation$' --exclude-long-poles", depends-on = [
  { task = "build-tests", args = [
    "ON",
    "Release",
  ] },
  { task = "build-simulation-tests", args = [
    "ON",
    "Release",
  ] },
] }
# Tier 2 simulation scope — every simulation test INCLUDING the long poles,
# run parallel + load-aware. This is what the authoritative verify-full gate
# (scripts/test_all.py) uses for its simulation phase so the
# long-pole CTest shards overlap the rest of the suite instead of one
# monolithic GTest binary bounding a worker (runtimes:
# docs/design/local_verification_pipeline.md).
test-simulation-full = { cmd = "python scripts/ctest_tier.py -L '^simulation$'", depends-on = [
  { task = "build-tests", args = [
    "ON",
    "Release",
  ] },
  { task = "build-simulation-tests", args = [
    "ON",
    "Release",
  ] },
] }
# Uses read-only check-lint (not autofix lint): a gate must not mutate sources
# while builds run in parallel. Run `pixi run lint` first to auto-fix.
verify = { depends-on = [
  "check-lint",
  "test-core",
  "test-simulation-quick",
  "test-py",
] }

# Tier 2 — run every C++ test (all labels), parallel + load-aware.
test-full = { cmd = "python scripts/ctest_tier.py", depends-on = [
  { task = "build-tests", args = [
    "ON",
    "Release",
  ] },
  { task = "build-simulation-tests", args = [
    "ON",
    "Release",
  ] },
] }

# Benchmark tiers mirror the test ladder.
bench-quick = { depends-on = ["bm-check"] }
bench = { depends-on = ["bm"] }
bench-full = { depends-on = [
  "bm",
  "bm-check",
  "bm-allocator-comparative-check",
] }

# ABI check (Linux only). Requires libabigail. Examples:
# - Default (compare HEAD to latest matching major tag):
#     pixi run abi-check
# - Compare tags: pixi run abi-check --from v6.16.0 --to v6.16.2
# - Compare refs: pixi run abi-check --from v6.16.0 --to HEAD
# - Override via env: DART_ABI_FROM=v6.16.0 DART_ABI_TO=origin/main pixi run abi-check
abi-check = { cmd = "python scripts/abi_check.py" }

