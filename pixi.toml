config-install = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
DART_FILAMENT_PLATFORM_DEFAULT=OFF
case "$(uname -s)-$(uname -m)" in
  Linux-x86_64|Linux-amd64)
    DART_FILAMENT_PLATFORM_DEFAULT=ON
    ;;
esac
DART_BUILD_GUI_VALUE=${DART_BUILD_GUI_OVERRIDE:-${DART_FILAMENT_PLATFORM_DEFAULT}}
DART_FETCH_FILAMENT_VALUE=${DART_FETCH_FILAMENT_OVERRIDE:-}
if [ -z "$DART_FETCH_FILAMENT_VALUE" ]; then
  DART_FETCH_FILAMENT_VALUE=${DART_FILAMENT_PLATFORM_DEFAULT}
fi
DART_DISABLE_COMPILER_CACHE_VALUE=${DART_DISABLE_COMPILER_CACHE:-OFF}
if [ "${SCCACHE_GHA_ENABLED:-}" = "false" ]; then
  DART_DISABLE_COMPILER_CACHE_VALUE=ON
  unset DART_COMPILER_CACHE
  unset CMAKE_C_COMPILER_LAUNCHER
  unset CMAKE_CXX_COMPILER_LAUNCHER
fi
if [ -z "${CMAKE_C_COMPILER_LAUNCHER:-}" ]; then
  if [ "${SCCACHE_GHA_ENABLED:-}" != "false" ] \
    && command -v sccache >/dev/null 2>&1; then
    CMAKE_C_COMPILER_LAUNCHER=sccache
    CMAKE_CXX_COMPILER_LAUNCHER=sccache
  elif command -v ccache >/dev/null 2>&1; then
    CMAKE_C_COMPILER_LAUNCHER=ccache
    CMAKE_CXX_COMPILER_LAUNCHER=ccache
  fi
fi
LAUNCHER_DEFS=""
if [ -n "${CMAKE_C_COMPILER_LAUNCHER:-}" ]; then
  LAUNCHER_DEFS="$LAUNCHER_DEFS -DCMAKE_C_COMPILER_LAUNCHER=${CMAKE_C_COMPILER_LAUNCHER}"
fi
if [ -n "${CMAKE_CXX_COMPILER_LAUNCHER:-}" ]; then
  LAUNCHER_DEFS="$LAUNCHER_DEFS -DCMAKE_CXX_COMPILER_LAUNCHER=${CMAKE_CXX_COMPILER_LAUNCHER}"
fi
cmake \
    -G Ninja \
    -S . \
    -B build/$PIXI_ENVIRONMENT_NAME/cpp \
    -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
    -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
    -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
    -DDART_BUILD_DARTPY={{ dartpy }} \
    -DDART_BUILD_GUI=${DART_BUILD_GUI_VALUE} \
    -DDART_BUILD_COLLISION_REFERENCE_TESTS=${DART_BUILD_COLLISION_REFERENCE_TESTS_OVERRIDE:-OFF} \
    -DDART_BUILD_COLLISION_REFERENCE_BENCHMARKS=${DART_BUILD_COLLISION_REFERENCE_BENCHMARKS_OVERRIDE:-OFF} \
    -DDART_DISABLE_COMPILER_CACHE=${DART_DISABLE_COMPILER_CACHE_VALUE} \
    -DDART_BUILD_PROFILE=OFF \
    -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
    -DDART_USE_SYSTEM_GOOGLETEST=ON \
    -DDART_USE_SYSTEM_IMGUI=ON \
    -DDART_FETCH_FILAMENT=${DART_FETCH_FILAMENT_VALUE} \
    -DDART_USE_SYSTEM_NANOBIND=OFF \
    -DDART_USE_SYSTEM_TRACY=OFF \
    -DDART_VERBOSE=$DART_VERBOSE \
    $LAUNCHER_DEFS
""",
], env = { DART_VERBOSE = "OFF", BUILD_TYPE = "Release" }, args = [
  { arg = "dartpy", default = "ON" },
] }

tracy-build = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE=Release
DART_TRACY_CMAKE_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE}
DART_TRACY_SRC_DIR=${DART_TRACY_CMAKE_DIR}/_deps/tracy-src/profiler
DART_TRACY_BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/tracy-profiler/${BUILD_TYPE}
DART_TRACY_BIN=${DART_TRACY_BUILD_DIR}/tracy-profiler
DART_TRACY_VERSION=0.13.1
if [ ! -d "${DART_TRACY_SRC_DIR}" ]; then
  echo "Tracy source was not fetched. Run DART_PROFILE_TRACY=ON pixi run config ON ${BUILD_TYPE}." >&2
  exit 1
fi
DART_TRACY_STAMP=${DART_TRACY_BUILD_DIR}/.dart-tracy-version
DART_TRACY_BUILT_VERSION=""
if [ -f "${DART_TRACY_STAMP}" ]; then
  IFS= read -r DART_TRACY_BUILT_VERSION < "${DART_TRACY_STAMP}"
fi
if [ -x "${DART_TRACY_BIN}" ] \
  && [ "${DART_TRACY_BUILT_VERSION}" = "${DART_TRACY_VERSION}" ] \
  && [ "${DART_TRACY_REBUILD:-OFF}" != "ON" ]; then
  echo "Tracy GUI client ${DART_TRACY_VERSION} is already built at ${DART_TRACY_BIN}."
  exit 0
fi
rm -rf "${DART_TRACY_BUILD_DIR}"
cmake \
  -G Ninja \
  -S "${DART_TRACY_SRC_DIR}" \
  -B "${DART_TRACY_BUILD_DIR}" \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
  -DLEGACY=ON \
  -DNO_PARALLEL_STL=ON \
  -DNO_ISA_EXTENSIONS=ON
cmake --build "${DART_TRACY_BUILD_DIR}" --target tracy-profiler --parallel "${DART_PARALLEL_JOBS:-$(python scripts/parallel_jobs.py)}"
printf "%s\n" "${DART_TRACY_VERSION}" > "${DART_TRACY_STAMP}"
""",
], depends-on = [
  { task = "config", args = [
    "ON",
    "Release",
    "ON",
    "ON",
    "ON",
  ] },
] }

tracy = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE=Release
DART_TRACY_BIN=build/$PIXI_ENVIRONMENT_NAME/tracy-profiler/${BUILD_TYPE}/tracy-profiler
if [ ! -x "${DART_TRACY_BIN}" ]; then
  echo "Tracy GUI client was not built; building it now." >&2
  pixi run tracy-build
fi
if [ ! -x "${DART_TRACY_BIN}" ]; then
  echo "Tracy GUI client was not built at ${DART_TRACY_BIN}." >&2
  exit 1
fi
export TRACY_DPI_SCALE=${TRACY_DPI_SCALE:-1}
exec "${DART_TRACY_BIN}" "$@"
""",
  "tracy",
] }

