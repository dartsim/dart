  exit 1
fi
echo "Env: default  Build: {{ build_type }}"
echo "Using dartpy from build/default/cpp/{{ build_type }}/python"
exec env PYTHONPATH="build/default/cpp/{{ build_type }}/python:${PYTHONPATH:-}" python
""",
