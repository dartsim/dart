[workspace]
name = "DART"
version = "7.0.0"
description = "Dynamic Animation and Robotics Toolkit"
authors = ["Jeongseok Lee <jslee02@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
assimp = ">=6.0.5,<7"
benchmark = ">=1.9.5,<2"
black = ">=26.5.1,<27"
clang-format = ">=22.1.7,<23"
cmake = ">=4.2.3,<5"
codespell = ">=2.4.2,<3"
console_bridge = ">=1.0.2,<2"
doxygen = ">=1.13.2,<2"
eigen = ">=5.0.1,<6"
entt = ">=3.16.0,<4"
foonathan-memory = ">=0.7.4,<0.8"
fmt = ">=12.1.0,<13"
gersemi = ">=0.24.0,<0.25"
gtest = ">=1.17.0,<2"
imgui = ">=1.92.8,<2"
isort = ">=8.0.1,<9"
jinja2 = ">=3.1.6,<4"
libboost-devel = ">=1.91.0,<2"
libjpeg-turbo = ">=3.1.4.1,<4"
libpng = ">=1.6.58,<2"
libsdformat = ">=16.0.1,<17"
myst-parser = ">=5.1.0,<6"
nanobind = ">=2.12.0,<3"
ninja = ">=1.13.2,<2"
numpy = ">=2.4.6,<3"
octomap = ">=1.10.0,<2"
pip = ">=26.1.2,<27"
pkg-config = ">=0.29.2,<0.30"
prettier = ">=3.8.3,<4"
pytest = ">=9.0.3,<10"
scikit-build-core = ">=0.12.1,<0.13"
sccache = ">=0.15.0,<0.16"
spdlog = ">=1.17.0,<2"
sphinx = ">=8.2.3,<9"
sphinx-lint = ">=1.0.2,<2"
sphinx-copybutton = ">=0.5.2,<0.6"
sphinx-intl = ">=2.3.2,<3"
sphinx-tabs = ">=3.4.1,<4"
sphinx_rtd_theme = ">=3.1.0,<4"
taplo = ">=0.10.0,<0.11"
taskflow = ">=4.0.0,<5"
tinyxml2 = ">=11.0.0,<12"
urdfdom = ">=5.1.2,<6"
nativefiledialog-extended = ">=1.3.0,<2"

[tasks]
clean = { cmd = "rm -rf build .deps .pixi pixi.lock" }

config = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE={{ build_type }}
DART_BUILD_PROFILE={{ build_profile }}
DART_PROFILE_BUILTIN={{ profile_builtin }}
DART_PROFILE_TRACY={{ profile_tracy }}
DART_ENABLE_ASAN=${DART_ENABLE_ASAN:-OFF}
DART_VERBOSE=${DART_VERBOSE:-OFF}
DART_BUILD_DARTPY_VALUE=${DART_BUILD_DARTPY_OVERRIDE:-{{ dartpy }}}
if [ -z "$DART_BUILD_DARTPY_VALUE" ]; then
  DART_BUILD_DARTPY_VALUE="{{ dartpy }}"
fi
DART_ENABLE_EXPERIMENTAL_CUDA_VALUE=${DART_ENABLE_EXPERIMENTAL_CUDA_OVERRIDE:-OFF}
DART_BUILD_DIFF_VALUE=${DART_BUILD_DIFF_OVERRIDE:-OFF}
DART_CUDA_ARCHITECTURES_VALUE=${DART_CUDA_ARCHITECTURES:-}
if [ "${DART_ENABLE_EXPERIMENTAL_CUDA_VALUE}" = "ON" ] \
  && [ -z "${DART_CUDA_ARCHITECTURES_VALUE}" ] \
  && command -v nvidia-smi >/dev/null 2>&1; then
  if DETECTED_CUDA_ARCHITECTURES=$(
    nvidia-smi --query-gpu=compute_cap --format=csv,noheader \
      | tr -cd '0-9\n' \
      | sed '/^$/d' \
      | sort -u \
      | paste -sd';' -
  ); then
    if [ -n "${DETECTED_CUDA_ARCHITECTURES}" ]; then
      DART_CUDA_ARCHITECTURES_VALUE=${DETECTED_CUDA_ARCHITECTURES}
    fi
  fi
fi
DART_BUILD_COLLISION_REFERENCE_TESTS_VALUE=${DART_BUILD_COLLISION_REFERENCE_TESTS_OVERRIDE:-OFF}
DART_BUILD_COLLISION_REFERENCE_BENCHMARKS_VALUE=${DART_BUILD_COLLISION_REFERENCE_BENCHMARKS_OVERRIDE:-OFF}
DART_FILAMENT_PLATFORM_DEFAULT=OFF
case "$(uname -s)-$(uname -m)" in
  Linux-x86_64|Linux-amd64)
    DART_FILAMENT_PLATFORM_DEFAULT=ON
    ;;
esac
DART_BUILD_GUI_VALUE=${DART_BUILD_GUI_OVERRIDE:-${DART_FILAMENT_PLATFORM_DEFAULT}}
DART_BUILD_EXAMPLES_VALUE=${DART_BUILD_EXAMPLES_OVERRIDE:-ON}
DART_BUILD_TUTORIALS_VALUE=${DART_BUILD_TUTORIALS_OVERRIDE:-ON}
DART_BUILD_TESTS_VALUE=${DART_BUILD_TESTS_OVERRIDE:-ON}
DART_USE_MOLD_VALUE=${DART_USE_MOLD_OVERRIDE:-OFF}
DART_USE_SYSTEM_IMGUI_VALUE=${DART_USE_SYSTEM_IMGUI_OVERRIDE:-ON}
DART_USE_SYSTEM_FILAMENT_VALUE=${DART_USE_SYSTEM_FILAMENT_OVERRIDE:-ON}
DART_FETCH_FILAMENT_VALUE=${DART_FETCH_FILAMENT_OVERRIDE:-}
if [ -z "$DART_FETCH_FILAMENT_VALUE" ]; then
  DART_FETCH_FILAMENT_VALUE=${DART_FILAMENT_PLATFORM_DEFAULT}
fi
DART_ENABLE_GUI_FILAMENT_SMOKE_TESTS_VALUE=${DART_ENABLE_GUI_FILAMENT_SMOKE_TESTS_OVERRIDE:-OFF}
DART_DISABLE_COMPILER_CACHE_VALUE=${DART_DISABLE_COMPILER_CACHE:-OFF}
if [ "${DART_ENABLE_EXPERIMENTAL_CUDA_VALUE}" = "ON" ] \
  && [ -z "${DART_DISABLE_COMPILER_CACHE:-}" ]; then
  DART_DISABLE_COMPILER_CACHE_VALUE=ON
fi
if [ "${SCCACHE_GHA_ENABLED:-}" = "false" ]; then
  DART_DISABLE_COMPILER_CACHE_VALUE=ON
  unset DART_COMPILER_CACHE
  unset CMAKE_C_COMPILER_LAUNCHER
  unset CMAKE_CXX_COMPILER_LAUNCHER
  unset CMAKE_CUDA_COMPILER_LAUNCHER
fi
if [ -z "${CMAKE_C_COMPILER_LAUNCHER:-}" ]; then
  if [ "${SCCACHE_GHA_ENABLED:-}" != "false" ] \
    && command -v sccache >/dev/null 2>&1; then
    CMAKE_C_COMPILER_LAUNCHER=sccache
    CMAKE_CXX_COMPILER_LAUNCHER=sccache
  elif command -v ccache >/dev/null 2>&1; then
    CMAKE_C_COMPILER_LAUNCHER=ccache
    CMAKE_CXX_COMPILER_LAUNCHER=ccache
  fi
fi
LAUNCHER_DEFS=""
if [ -n "${CMAKE_C_COMPILER_LAUNCHER:-}" ]; then
  LAUNCHER_DEFS="$LAUNCHER_DEFS -DCMAKE_C_COMPILER_LAUNCHER=${CMAKE_C_COMPILER_LAUNCHER}"
fi
if [ -n "${CMAKE_CXX_COMPILER_LAUNCHER:-}" ]; then
  LAUNCHER_DEFS="$LAUNCHER_DEFS -DCMAKE_CXX_COMPILER_LAUNCHER=${CMAKE_CXX_COMPILER_LAUNCHER}"
fi
if [ "${DART_ENABLE_EXPERIMENTAL_CUDA_VALUE}" = "ON" ]; then
  # Do not automatically reuse the C++ launcher for nvcc. sccache can leave
  # nvcc/fatbinary without its generated PTX input on local CUDA builds.
  if [ -n "${CMAKE_CUDA_COMPILER_LAUNCHER:-}" ]; then
    LAUNCHER_DEFS="$LAUNCHER_DEFS -DCMAKE_CUDA_COMPILER_LAUNCHER=${CMAKE_CUDA_COMPILER_LAUNCHER}"
  else
    LAUNCHER_DEFS="$LAUNCHER_DEFS -DCMAKE_CUDA_COMPILER_LAUNCHER="
  fi
fi
NANOBIND_CMAKE_DIR=$(python -m nanobind --cmake_dir)
cmake \
  -G Ninja \
  -S . \
  -B build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE} \
  -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
  -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
  -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
  -DDART_BUILD_DARTPY=${DART_BUILD_DARTPY_VALUE} \
  -DDART_ENABLE_EXPERIMENTAL_CUDA=${DART_ENABLE_EXPERIMENTAL_CUDA_VALUE} \
  -DDART_BUILD_DIFF=${DART_BUILD_DIFF_VALUE} \
  -DDART_CUDA_ARCHITECTURES=${DART_CUDA_ARCHITECTURES_VALUE} \
  -DDART_BUILD_COLLISION_REFERENCE_TESTS=${DART_BUILD_COLLISION_REFERENCE_TESTS_VALUE} \
  -DDART_BUILD_COLLISION_REFERENCE_BENCHMARKS=${DART_BUILD_COLLISION_REFERENCE_BENCHMARKS_VALUE} \
  -DDART_BUILD_GUI=${DART_BUILD_GUI_VALUE} \
  -DDART_BUILD_EXAMPLES=${DART_BUILD_EXAMPLES_VALUE} \
  -DDART_BUILD_TUTORIALS=${DART_BUILD_TUTORIALS_VALUE} \
  -DDART_BUILD_TESTS=${DART_BUILD_TESTS_VALUE} \
  -DDART_USE_MOLD=${DART_USE_MOLD_VALUE} \
  -DDART_BUILD_PROFILE=${DART_BUILD_PROFILE} \
  -DDART_PROFILE_BUILTIN=${DART_PROFILE_BUILTIN} \
  -DDART_PROFILE_TRACY=${DART_PROFILE_TRACY} \
  -DDART_ENABLE_ASAN=${DART_ENABLE_ASAN} \
  -DDART_DISABLE_COMPILER_CACHE=${DART_DISABLE_COMPILER_CACHE_VALUE} \
  -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
  -DDART_USE_SYSTEM_GOOGLETEST=ON \
  -DDART_USE_SYSTEM_IMGUI=${DART_USE_SYSTEM_IMGUI_VALUE} \
  -DDART_USE_SYSTEM_FILAMENT=${DART_USE_SYSTEM_FILAMENT_VALUE} \
  -DDART_FETCH_FILAMENT=${DART_FETCH_FILAMENT_VALUE} \
  -DDART_ENABLE_GUI_FILAMENT_SMOKE_TESTS=${DART_ENABLE_GUI_FILAMENT_SMOKE_TESTS_VALUE} \
  -DDART_USE_SYSTEM_NANOBIND=OFF \
  -DDART_USE_SYSTEM_TRACY=OFF \
  -DDART_VERBOSE=${DART_VERBOSE} \
  -Dnanobind_DIR=${NANOBIND_CMAKE_DIR} \
  $LAUNCHER_DEFS
""",
], env = { DART_VERBOSE = "OFF" }, args = [
  { arg = "dartpy", default = "ON" },
  { arg = "build_type", default = "Release" },
  { arg = "build_profile", default = "ON" },
  { arg = "profile_builtin", default = "ON" },
  { arg = "profile_tracy", default = "OFF" },
] }

# Auto-fix formatting issues (runs black and isort to format code)
lint-cpp = { cmd = """
    cmake \
    --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
    --target format
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

lint-simulation = { cmd = """
    find dart/simulation tests/unit/simulation tests/benchmark/simulation -type f \\( -name '*.hpp' -o -name '*.cpp' -o -name '*.cuh' -o -name '*.cu' \\) -print0 | xargs -0 clang-format -i --style=file
""" }

lint-collision-native = { cmd = """
    find dart/collision/native tests/unit/collision tests/benchmark/collision/native -type f \\( -name '*.hpp' -o -name '*.cpp' \\) -print0 | xargs -0 clang-format -i --style=file
""" }

lint-py = { cmd = """
    black . --extend-exclude '/\\.[^/]+' && isort . --skip-glob '.*'
""" }

lint-yaml = { cmd = """
    prettier --write '**/*.{yml,yaml}' '!**/.pixi/**' '!**/build/**' '!**/external/**' '!**/node_modules/**'
""" }

lint-toml = { cmd = ["bash", "-lc", "python scripts/lint_toml.py"] }

lint-cmake = { cmd = ["python", "scripts/lint_cmake.py"] }

lint-md = { cmd = """
    prettier --write '**/*.md' '!**/.pixi/**' '!**/build/**' '!**/external/**' '!**/node_modules/**' '!.codex/**' '!.opencode/**'
""" }

lint-rst = { cmd = ["python", "scripts/lint_rst.py"] }

lint-spell = { cmd = "codespell --write-changes --config .codespellrc" }

check-collision-runtime-isolation = { cmd = "python scripts/check_collision_runtime_isolation.py" }
audit-collision-compat-facades = { cmd = "python scripts/audit_collision_compat_facades.py" }
check-native-collision-superset = { cmd = "python scripts/check_native_collision_superset_status.py" }
audit-dart7-promotion-surface = { cmd = "python scripts/audit_dart7_promotion_surface.py" }
# Enforcement gate: fail if any promoted public header reintroduces an ECS leak
# (which would re-expose EnTT through the public surface). The tree is clean.
check-dart7-promotion-surface = { cmd = "python scripts/audit_dart7_promotion_surface.py --strict" }
check-dart7-promotion-package-contract = { cmd = "python scripts/check_dart7_promotion_package_contract.py" }
check-dart7-world-promotion-blockers = { cmd = "python scripts/check_dart7_world_promotion_blockers.py" }
check-dart7-final-world-promotion = { cmd = "python scripts/check_dart7_world_promotion_blockers.py --strict-final --require-release6-branch" }
check-dart7-promotion-installed-package = { cmd = ["bash", "-lc", """
set -euo pipefail
BUILD_TYPE={{ build_type }}
BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE}-promotion-install-smoke
python scripts/check_dart7_promotion_installed_package.py \
  --build-dir ${BUILD_DIR} \
  --prefix ${BUILD_DIR}/install-prefix \
  --build-type ${BUILD_TYPE}
"""], args = [{ arg = "build_type", default = "Release" }] }
check-dartpy-import-layout = { cmd = "python scripts/check_dartpy_import_layout.py" }

lint-api-boundaries = { cmd = ["python", "scripts/check_api_boundaries.py"] }
lint-compute-backend-boundaries = { cmd = [
  "python",
  "scripts/check_compute_backend_boundaries.py",
] }
lint-no-gpu-runtime-dependencies = { cmd = [
  "python",
  "scripts/check_no_gpu_runtime_dependencies.py",
] }
lint-phase5-cuda-benchmark-contract = { cmd = [
  "python",
  "scripts/check_phase5_cuda_benchmark_contract.py",
] }
lint-phase5-cuda-workflow = { cmd = [
  "python",
  "scripts/check_phase5_cuda_workflow.py",
] }
lint-plan083-gpu-parity-packet = { cmd = [
  "python",
  "scripts/check_plan083_gpu_parity_packet.py",
] }
lint-plan083-cpu-scene-corpus = { cmd = [
  "python",
  "scripts/check_plan083_cpu_scene_corpus.py",
] }
lint-plan083-completion-audit = { cmd = [
  "python",
  "scripts/check_plan083_completion_audit.py",
] }
lint-lcp-solver-roster = { cmd = [
  "python",
  "scripts/check_lcp_solver_roster.py",
] }
lint-plan122-allocation-matrix = { cmd = [
  "python",
  "scripts/check_plan122_allocation_matrix.py",
] }
lint-avbd-packets = { cmd = ["python", "scripts/check_avbd_packets.py"] }
lint-architecture-page = { cmd = [
  "python",
  "scripts/check_architecture_page_lint.py",
] }

report-api-boundary-inventory = { cmd = [
  "python",
  "scripts/generate_api_boundary_inventory.py",
] }

lint = { depends-on = [
  "lint-spell",
  "lint-cpp",
  "lint-simulation",
  "lint-collision-native",
  "lint-cmake",
  "lint-py",
  "lint-yaml",
  "lint-toml",
  "lint-md",
  "lint-rst",
  "check-collision-runtime-isolation",
  "audit-collision-compat-facades",
  "check-native-collision-superset",
  "lint-api-boundaries",
  "lint-compute-backend-boundaries",
  "lint-no-gpu-runtime-dependencies",
  "lint-phase5-cuda-benchmark-contract",
  "lint-phase5-cuda-workflow",
  "lint-plan083-cpu-scene-corpus",
  "lint-plan083-gpu-parity-packet",
  "lint-plan083-completion-audit",
  "lint-lcp-solver-roster",
  "lint-plan122-allocation-matrix",
  "lint-avbd-packets",
  "lint-architecture-page",
  "sync-ai-commands",
] }

# Check formatting without modifying files (used in CI)
check-lint-cpp = { cmd = """
    cmake \
        --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
        --target check-format
""", depends-on = ["config"], env = { BUILD_TYPE = "Release" } }

check-lint-simulation = { cmd = """
    find dart/simulation tests/unit/simulation tests/benchmark/simulation -type f \\( -name '*.hpp' -o -name '*.cpp' -o -name '*.cuh' -o -name '*.cu' \\) -print0 | xargs -0 clang-format --dry-run --Werror --style=file
""" }

check-lint-collision-native = { cmd = """
    find dart/collision/native tests/unit/collision tests/benchmark/collision/native -type f \\( -name '*.hpp' -o -name '*.cpp' \\) -print0 | xargs -0 clang-format --dry-run --Werror --style=file
""" }

check-lint-py = { cmd = """
    black . --check --extend-exclude '/\\.[^/]+' && isort . --check --skip-glob '.*'
""" }

check-lint-yaml = { cmd = """
    prettier --check '**/*.{yml,yaml}' '!**/.pixi/**' '!**/build/**' '!**/external/**' '!**/node_modules/**'
""" }

check-lint-toml = { cmd = [
  "bash",
  "-lc",
  "python scripts/lint_toml.py --check",
] }

check-lint-md = { cmd = """
    prettier --check '**/*.md' '!**/.pixi/**' '!**/build/**' '!**/external/**' '!**/node_modules/**' '!.codex/**' '!.opencode/**'
""" }

check-lint-rst = { cmd = ["python", "scripts/lint_rst.py"] }

check-lint-spell = { cmd = "codespell --config .codespellrc" }

check-lint-cmake = { cmd = ["python", "scripts/lint_cmake.py", "--check"] }

check-docs-policy = { cmd = ["python", "scripts/check_docs_policy.py"] }

check-dart7-clean-break-policy = { cmd = [
  "python",
  "scripts/check_dart7_clean_break_policy.py",
] }

check-api-boundaries = { cmd = ["python", "scripts/check_api_boundaries.py"] }
check-compute-backend-boundaries = { cmd = [
  "python",
  "scripts/check_compute_backend_boundaries.py",
] }
check-no-gpu-runtime-dependencies = { cmd = [
  "python",
  "scripts/check_no_gpu_runtime_dependencies.py",
] }
check-phase5-cuda-benchmark-contract = { cmd = [
  "python",
  "scripts/check_phase5_cuda_benchmark_contract.py",
] }
check-phase5-cuda-workflow = { cmd = [
  "python",
  "scripts/check_phase5_cuda_workflow.py",
] }
check-plan083-gpu-parity-packet = { cmd = [
  "python",
  "scripts/check_plan083_gpu_parity_packet.py",
] }
check-plan083-cpu-scene-corpus = { cmd = [
  "python",
  "scripts/check_plan083_cpu_scene_corpus.py",
] }
check-plan083-completion-audit = { cmd = [
  "python",
  "scripts/check_plan083_completion_audit.py",
] }
check-lcp-solver-roster = { cmd = [
  "python",
  "scripts/check_lcp_solver_roster.py",
] }
check-plan122-allocation-matrix = { cmd = [
  "python",
  "scripts/check_plan122_allocation_matrix.py",
] }
check-avbd-packets = { cmd = ["python", "scripts/check_avbd_packets.py"] }
check-architecture-page = { cmd = [
  "python",
  "scripts/check_architecture_page_lint.py",
