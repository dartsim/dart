ex = { cmd = "python scripts/run_cpp_example.py", depends-on = ["config"] }

# Launch the standalone dartsim GUI editor. Builds against the fetched ImGui
# docking branch (DART_USE_SYSTEM_IMGUI_OVERRIDE=OFF) so the editor's dockable
# panels are available; run_cpp_example.py ensures the GUI/filament/docking-imgui
# build requirements (and reports if `pixi run config` has not been run yet).
# Deliberately does not depend on `config`, which forces system ImGui ON and
# would thrash the ImGui cache on every launch. Extra CLI args pass through, e.g.
# `pixi run dartsim -- --width 1600 --height 900`.
dartsim = { cmd = [
  "python",
  "scripts/run_cpp_example.py",
  "dartsim",
], env = { BUILD_TYPE = "Release", DART_VERBOSE = "OFF", DART_BUILD_DARTPY_OVERRIDE = "OFF", DART_BUILD_GUI_OVERRIDE = "ON", DART_FETCH_FILAMENT_OVERRIDE = "ON", DART_USE_SYSTEM_FILAMENT_OVERRIDE = "OFF", DART_USE_SYSTEM_IMGUI_OVERRIDE = "OFF" } }

# Diagnostic (not part of the default test suite): render the dartsim scene
# headlessly to both the swapchain and an offscreen Filament RenderTarget and
# assert they match. This is the Phase-1 parity gate of the offscreen-viewport
# spike (see docs/design/dartsim_gui_toolkit_decisions.md, Decision 3). Requires
# a graphics context (headless OpenGL/llvmpipe). Exits non-zero on divergence.
gui-offscreen-parity = { cmd = [
  "python",
  "scripts/run_cpp_example.py",
  "dartsim",
  "--headless",
  "--frames",
  "3",
  "--backend",
