build-math-tests = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE=${BUILD_TYPE:-Release}
BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE}
