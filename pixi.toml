test-cuda = { cmd = [
  "bash",
  "-lc",
  """
set -euo pipefail
BUILD_TYPE={{ build_type }}
BUILD_DIR=build/$PIXI_ENVIRONMENT_NAME/cpp/${BUILD_TYPE}
# CUDA test selection is small and GPU-bound. Use bounded parallelism without
# the stale one-minute load-average guard so a just-finished build does not
# delay the smoke path; the long CUDA LCP corpus remains one scheduled test.
DART_BUILD_LOAD_LIMIT=0 python scripts/ctest_tier.py \
  --build-type "${BUILD_TYPE}" --jobs 2 -L simulation-cuda
# Benchmark smoke runs go through run_benchmark_smoke.py because Google Benchmark
# exits 0 even when a --benchmark_filter matches nothing; the wrapper fails loudly
# so a renamed or dropped benchmark cannot silently stop being exercised.
python scripts/run_benchmark_smoke.py "${BUILD_DIR}/bin/bm_cuda_rigid_body_state_batch" \
  --benchmark_filter='BM_Phase5RigidBodyBatch(CpuBaseline|Gpu)/1024/128/10$' \
  --benchmark_min_time=1ms
python scripts/run_benchmark_smoke.py "${BUILD_DIR}/bin/bm_cuda_rigid_body_state_batch" \
  --benchmark_filter='BM_(CpuSingleThread|CpuMulticore|CudaResident)RigidBodyStateBatchLinearRollout/4/256/1$' \
  --benchmark_min_time=0.001s
python scripts/run_benchmark_smoke.py "${BUILD_DIR}/bin/bm_plan083_gpu_psd_projection" \
  --benchmark_filter='BM_Plan083PsdProjection(Cpu|Cuda)/1024(/real_time)?$' \
  --benchmark_min_time=0.001s
python scripts/run_benchmark_smoke.py "${BUILD_DIR}/bin/bm_plan083_gpu_contact_candidates" \
  --benchmark_filter='BM_Plan083ContactCandidate(Cpu|Cuda)/4096(/real_time)?$' \
  --benchmark_min_time=0.001s
python scripts/run_benchmark_smoke.py "${BUILD_DIR}/bin/bm_plan083_gpu_ccd_line_search" \
  --benchmark_filter='BM_Plan083CcdLineSearch(Cpu|Cuda)/4096(/real_time)?$' \
  --benchmark_min_time=0.001s
python scripts/run_benchmark_smoke.py "${BUILD_DIR}/bin/bm_plan083_gpu_barrier_friction" \
  --benchmark_filter='BM_Plan083BarrierFrictionLocal(Cpu|Cuda)/4096(/real_time)?$' \
