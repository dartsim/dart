name: Configure compiler cache
description: Configure sccache/ccache environment variables and fall back when the launcher is unusable.
runs:
  using: composite
  steps:
    - name: Configure compiler cache environment
      shell: bash
      run: |
        set -euo pipefail

        HAS_GHA_CACHE=0
        if [ -n "${ACTIONS_CACHE_URL:-}" ]; then
          HAS_GHA_CACHE=1
          echo "SCCACHE_GHA_ENABLED=true" >> "${GITHUB_ENV}"
        else
          echo "SCCACHE_GHA_ENABLED=false" >> "${GITHUB_ENV}"
        fi
        echo "SCCACHE_NO_DAEMON=1" >> "${GITHUB_ENV}"
        echo "SCCACHE_IGNORE_SERVER_IO_ERROR=1" >> "${GITHUB_ENV}"

        DISABLE_SCCACHE=0
        if [ "${HAS_GHA_CACHE}" -eq 0 ]; then
          DISABLE_SCCACHE=1
          echo "GitHub Actions cache URL is unavailable; disabling sccache launcher." >&2
        fi

        RUNNER_NAME_VALUE="${RUNNER_NAME:-}"
        if [ "${RUNNER_OS:-}" = "Linux" ]; then
          case "${RUNNER_NAME_VALUE}" in
            GitHub\ Actions*) ;;
            *)
              DISABLE_SCCACHE=1
              echo "Self-hosted Linux runner detected (RUNNER_NAME=${RUNNER_NAME_VALUE:-unknown}); disabling sccache launcher." >&2
              ;;
          esac

          if [ "${DISABLE_SCCACHE}" -eq 0 ] && [ -f /etc/os-release ]; then
            OS_ID="$(. /etc/os-release && echo "${ID:-}")"
            if [ -n "${OS_ID}" ] && [ "${OS_ID}" != "ubuntu" ]; then
              DISABLE_SCCACHE=1
              echo "Non-Ubuntu Linux runner detected (ID=${OS_ID}); disabling sccache launcher." >&2
            fi
          fi
        fi

        CCACHE_COMPILER_LAUNCHER_VALUE=""
        if command -v ccache >/dev/null 2>&1; then
          CCACHE_COMPILER_LAUNCHER_VALUE="ccache"
        fi

        DART_COMPILER_CACHE_VALUE=""
        CMAKE_COMPILER_LAUNCHER_VALUE="env"
        if [ "${DISABLE_SCCACHE}" -eq 0 ]; then
          if [ -n "${SCCACHE_PATH:-}" ]; then
            DART_COMPILER_CACHE_VALUE="sccache"
            CMAKE_COMPILER_LAUNCHER_VALUE="${SCCACHE_PATH}"
          elif command -v sccache >/dev/null 2>&1; then
            DART_COMPILER_CACHE_VALUE="sccache"
            CMAKE_COMPILER_LAUNCHER_VALUE="sccache"
          fi
        fi

        if [ -z "${DART_COMPILER_CACHE_VALUE}" ] && [ -n "${CCACHE_COMPILER_LAUNCHER_VALUE}" ]; then
          DART_COMPILER_CACHE_VALUE="ccache"
          CMAKE_COMPILER_LAUNCHER_VALUE="${CCACHE_COMPILER_LAUNCHER_VALUE}"
        fi

        if [ "${DART_COMPILER_CACHE_VALUE}" = "sccache" ]; then
          CC_PATH="$(command -v cc || true)"
          if [ -n "${CC_PATH}" ]; then
            SANITY_DIR="${GITHUB_WORKSPACE}/build/sccache-sanity/CMakeFiles/CMakeScratch/TryCompile-sanity"
            mkdir -p "${SANITY_DIR}"
            printf '%s\n' 'int main(void) { return 0; }' > "${SANITY_DIR}/testCCompiler.c"
            if ! "${CMAKE_COMPILER_LAUNCHER_VALUE}" "${CC_PATH}" -o "${SANITY_DIR}/testCCompiler.c.o" -c "${SANITY_DIR}/testCCompiler.c"; then
              if [ -n "${CCACHE_COMPILER_LAUNCHER_VALUE}" ]; then
                echo "sccache sanity check failed; falling back to ccache" >&2
                DART_COMPILER_CACHE_VALUE="ccache"
                CMAKE_COMPILER_LAUNCHER_VALUE="${CCACHE_COMPILER_LAUNCHER_VALUE}"
              else
                echo "sccache sanity check failed; falling back to no-op launcher (env)" >&2
                DART_COMPILER_CACHE_VALUE=""
                CMAKE_COMPILER_LAUNCHER_VALUE="env"
              fi
            fi
          fi
        fi

        echo "DART_COMPILER_CACHE=${DART_COMPILER_CACHE_VALUE}" >> "${GITHUB_ENV}"
        echo "CMAKE_C_COMPILER_LAUNCHER=${CMAKE_COMPILER_LAUNCHER_VALUE}" >> "${GITHUB_ENV}"
        echo "CMAKE_CXX_COMPILER_LAUNCHER=${CMAKE_COMPILER_LAUNCHER_VALUE}" >> "${GITHUB_ENV}"

        # Self-hosted runners are long-lived but the Actions runner wipes
        # RUNNER_TEMP every job, so a ccache there is always cold and each build
        # compiles from scratch. Keep the cache on the persistent per-runner
        # tool-cache directory instead. GitHub-hosted runners are ephemeral, so
        # RUNNER_TEMP is correct there (and avoids leaking cache across images).
        CCACHE_DIR_VALUE="${RUNNER_TEMP}/ccache"
        case "${RUNNER_NAME_VALUE}" in
          GitHub\ Actions*) ;;
          *) CCACHE_DIR_VALUE="${RUNNER_TOOL_CACHE}/dart-ccache" ;;
        esac

        echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}" >> "${GITHUB_ENV}"
        echo "CCACHE_DIR=${CCACHE_DIR_VALUE}" >> "${GITHUB_ENV}"
        echo "CCACHE_COMPRESS=true" >> "${GITHUB_ENV}"
        echo "CCACHE_MAXSIZE=5G" >> "${GITHUB_ENV}"
        mkdir -p "${CCACHE_DIR_VALUE}"
