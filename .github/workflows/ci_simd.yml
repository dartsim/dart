name: CI SIMD Multi-Arch

on:
  push:
    # Branch validation happens via pull_request; only run on push for the
    # mainline refs to avoid duplicate push+PR runs on feature branches.
    branches:
      - "main"
      - "release-*"
    paths:
      - "dart/simd/**"
      - "tests/unit/simd/**"
      - "tests/benchmark/simd/**"
      - ".github/workflows/ci_simd.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "dart/simd/**"
      - "tests/unit/simd/**"
      - "tests/benchmark/simd/**"
      - ".github/workflows/ci_simd.yml"
  workflow_dispatch:

concurrency:
  # Protected main-branch runs should not replace pending validation runs.
  # GitHub's default concurrency queue keeps only one pending run, so use a
  # run-specific group on main while keeping PR/topic refs cancellable.
  group: >-
    ${{ github.ref == 'refs/heads/main'
        && format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  simd-x86-levels:
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        simd_level:
          - name: scalar
            cmake_flags: "-DDART_SIMD_FORCE_SCALAR=ON"
          - name: sse42
            cmake_flags: "-DCMAKE_CXX_FLAGS=-msse4.2"
          - name: avx
            cmake_flags: "-DCMAKE_CXX_FLAGS='-mavx -mno-avx2'"
          - name: avx2
            cmake_flags: "-DCMAKE_CXX_FLAGS='-mavx2 -mfma'"
    name: x86_64 ${{ matrix.simd_level.name }}
    env:
      DART_PARALLEL_JOBS: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build SIMD library
        run: |
          pixi run cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDART_BUILD_TESTS=ON \
            -DDART_BUILD_DARTPY=OFF \
            -DDART_BUILD_EXAMPLES=OFF \
            -DDART_BUILD_TUTORIALS=OFF \
            -DDART_BUILD_GUI=OFF \
            -DDART_BUILD_COLLISION_REFERENCE_TESTS=OFF \
            -DDART_BUILD_COLLISION_REFERENCE_BENCHMARKS=OFF \
            ${{ matrix.simd_level.cmake_flags }}

      - name: Build SIMD tests
        run: |
          pixi run cmake --build build --target \
            UNIT_simd_simd_vec_scalar \
            UNIT_simd_simd_vec_mask_scalar \
            UNIT_simd_simd_operations_scalar \
            UNIT_simd_simd_config \
            UNIT_simd_simd_edge_cases \
            UNIT_simd_simd_eigen_interop \
            UNIT_simd_simd_batch_soa \
            UNIT_simd_simd_dynamic \
            UNIT_simd_simd_geometry \
            UNIT_simd_simd_math

      - name: Run SIMD tests
        run: |
          cd build && ctest -R "UNIT_simd" --output-on-failure

  simd-arm64-neon:
    if: github.event.deleted != true
    runs-on: macos-latest
    name: ARM64 NEON (macOS)
    env:
      DART_PARALLEL_JOBS: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          cache: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          sccache-continue-on-error: true

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build SIMD library
        run: |
          pixi run cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDART_BUILD_TESTS=ON \
            -DDART_BUILD_DARTPY=OFF \
            -DDART_BUILD_EXAMPLES=OFF \
            -DDART_BUILD_TUTORIALS=OFF \
            -DDART_BUILD_GUI=OFF \
            -DDART_BUILD_COLLISION_REFERENCE_TESTS=OFF \
            -DDART_BUILD_COLLISION_REFERENCE_BENCHMARKS=OFF

      - name: Build SIMD tests
        run: |
          pixi run cmake --build build --target \
            UNIT_simd_simd_vec_scalar \
            UNIT_simd_simd_vec_mask_scalar \
            UNIT_simd_simd_operations_scalar \
            UNIT_simd_simd_config \
            UNIT_simd_simd_edge_cases \
            UNIT_simd_simd_eigen_interop \
            UNIT_simd_simd_batch_soa \
            UNIT_simd_simd_dynamic \
            UNIT_simd_simd_geometry \
            UNIT_simd_simd_math

      - name: Run SIMD tests
        run: |
          cd build && ctest -R "UNIT_simd" --output-on-failure
