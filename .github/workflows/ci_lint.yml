name: CI Lint

on:
  push:
    # Branch validation happens via pull_request; only run on push for the
    # mainline refs to avoid duplicate push+PR runs on feature branches.
    branches:
      - "main"
      - "release-*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  # Protected main/release-branch runs should not replace pending lint/doc
  # validations.
  # GitHub's default concurrency queue keeps only one pending run, so use a
  # run-specific group for preserved refs while keeping PR/topic refs cancellable.
  group: >-
    ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-'))
        && format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: >-
    ${{ github.ref != 'refs/heads/main'
        && !startsWith(github.ref, 'refs/heads/release-') }}

jobs:
  lint:
    name: Lint
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Check Lint
        run: pixi run check-lint

  docs:
    name: Documentation
    if: >-
      github.event.deleted != true &&
      (github.event_name != 'push' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release-'))
    runs-on: ubuntu-latest
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Build documentation
        run: pixi run docs-build
