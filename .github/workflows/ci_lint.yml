name: CI Lint

on:
  push:
    # Branch validation happens via pull_request; only run on push for the
    # mainline refs to avoid duplicate push+PR runs on feature branches.
    branches:
      - "main"
      - "release-*"
    paths-ignore:
      - ".github/workflows/cache_*.yml"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - ".github/workflows/cache_*.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            else
              find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Check Lint
        run: pixi run check-lint

  docs:
    name: Documentation
    if: >-
      github.event.deleted != true &&
      (github.event_name != 'push' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release-'))
    runs-on: ubuntu-latest
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            else
              find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Build documentation
        run: pixi run docs-build
