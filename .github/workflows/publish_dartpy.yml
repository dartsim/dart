---
name: Publish dartpy

"on":
  push:
    branches:
      - "main"
      - "release-*"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "0 10 * * 0,3"
  workflow_dispatch:

concurrency:
  # Include the event name so a manual workflow_dispatch publish is not
  # cancelled by a push-triggered wheel build of the same ref.
  # Protected main/release-branch and scheduled runs should not replace pending
  # wheel runs, so include the run id only for refs that must be preserved.
  group: >-
    ${{ (github.event_name == 'schedule'
        || github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/heads/release-'))
        && format('{0}-{1}-{2}-{3}', github.workflow, github.ref, github.event_name, github.run_id)
        || format('{0}-{1}-{2}', github.workflow, github.ref, github.event_name) }}
  cancel-in-progress: >-
    ${{ github.event_name != 'schedule'
        && github.ref != 'refs/heads/main'
        && !startsWith(github.ref, 'refs/heads/release-') }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.code_filter.outputs.code }}
      wheel_workflow: ${{ steps.wheel_filter.outputs.wheel_workflow }}
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: code_filter
        with:
          filters: .github/filters/ci-code.yml
      - uses: dorny/paths-filter@v4
        id: wheel_filter
        with:
          filters: |
            wheel_workflow:
              - '.github/workflows/publish_dartpy.yml'

  wheel_matrix:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          if [[ "${{ needs.changes.outputs.wheel_workflow }}" == "true" \
             || "$GITHUB_EVENT_NAME" == "schedule" \
             || "$GITHUB_EVENT_NAME" == "workflow_dispatch" \
             || "$GITHUB_REF" == "refs/heads/main" \
             || "$GITHUB_REF" == refs/heads/release-* \
             || "$GITHUB_REF" == refs/tags/v* ]]; then
            cat >> "$GITHUB_OUTPUT" <<'EOF'
          matrix<<JSON
          {
            "include": [
              {"os":"ubuntu-latest","python-version":"314"},
              {"os":"macos-15","python-version":"314"},
              {"os":"windows-2025-vs2026","python-version":"314"}
            ]
          }
          JSON
          EOF
          else
            cat >> "$GITHUB_OUTPUT" <<'EOF'
          matrix<<JSON
          {
            "include": [
              {"os":"ubuntu-latest","python-version":"314"},
              {"os":"macos-15","python-version":"314"},
              {"os":"windows-2025-vs2026","python-version":"314"}
            ]
          }
          JSON
          EOF
          fi

  build_wheels:
    needs: [changes, wheel_matrix]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true'
    name: Wheels | ${{ matrix.os }} Py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    # Fail fast on a regression instead of waiting for the ~6h default kill.
    # Sized generously for a first cold-sccache Windows Ninja wheel build; Linux/macOS
    # wheels already use Ninja and finish well under this bound.
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    env:
      # Keep parallelism modest to avoid posix_spawn failures on hosted runners
      DART_PARALLEL_JOBS: 8
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    # Note: No dedicated container image is used; all platforms rely on pixi environments.
    # Linux wheels: auditwheel derives the glibc compatibility tag from bundled symbols.
    # macOS wheels: delocate bundles dylibs. Windows wheels: delvewheel bundles DLLs.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.wheel_matrix.outputs.matrix) }}
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-version: latest
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi${{ runner.os == 'Windows' && '.exe' || '' }}
          environments: py${{ matrix.python-version }}-wheel
          install-args: -e py${{ matrix.python-version }}-wheel

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build wheel
        env:
          # Work around occasional sccache spawn failures on ubuntu-latest + Python 3.14 wheel builds.
          DART_DISABLE_COMPILER_CACHE: ${{ (matrix.os == 'ubuntu-latest' && matrix.python-version == '314') && 'ON' || 'OFF' }}
        run: pixi run -e py${{ matrix.python-version }}-wheel wheel-build

      - name: Repair wheel
        run: pixi run -e py${{ matrix.python-version }}-wheel wheel-repair

      - name: Verify wheel
        run: pixi run -e py${{ matrix.python-version }}-wheel wheel-verify

      - name: Test wheel
        run: pixi run -e py${{ matrix.python-version }}-wheel wheel-test

      - uses: actions/upload-artifact@v7
        with:
          path: ./dist/*.whl
          name: ${{ matrix.os }}-py${{ matrix.python-version }}

  wheels:
    name: Wheels
    needs: [changes, wheel_matrix, build_wheels]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check wheel matrix result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          MATRIX_RESULT: ${{ needs.wheel_matrix.result }}
          WHEEL_RESULT: ${{ needs.build_wheels.result }}
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::changes job result was '$CHANGES_RESULT'"
            exit 1
          fi

          if [[ "$MATRIX_RESULT" != "success" ]]; then
            echo "::error::wheel_matrix job result was '$MATRIX_RESULT'"
            exit 1
          fi

          if [[ "$WHEEL_RESULT" == "success" ]]; then
            exit 0
          fi

          if [[ "$WHEEL_RESULT" == "skipped" && "$CODE_CHANGED" != "true" ]]; then
            if [[ "$EVENT_NAME" == "pull_request" || "$REF_NAME" == refs/heads/* ]]; then
              echo "Wheel build skipped because this update does not affect wheel-relevant code."
              exit 0
            fi
          fi

          echo "::error::build_wheels job result was '$WHEEL_RESULT'"
          exit 1

  upload_pypi:
    name: Wheels | Publish to PyPI
    needs: [build_wheels, wheels]
    runs-on: ubuntu-latest
    # Publish all tagged versions (stable and dev) to production PyPI
    # Examples: v7.0.0, v7.0.0.dev0, v7.0.0.alpha1, v7.0.0.beta1, v7.0.0.rc1
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          # unpacks default artifact into dist/
          # if `name: artifact` is omitted, the action will create extra parent dir
          # name: artifact
          path: dist
          merge-multiple: true

      - name: List files in dist
        run: ls -lR dist/

      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
