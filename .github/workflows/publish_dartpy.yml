---
name: Publish dartpy

'on':
  push:
    branches:
      - "main"
      - "release-*"
    tags:
      - "v*.*.*"
  schedule:
    - cron: "0 10 * * 0,3"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/sha) to build; publishing requires a version tag (v*)"
        required: false
        default: ""
      checkout_ref:
        description: "Optional git ref (tag/sha) to checkout for building; defaults to `ref` when set"
        required: false
        default: ""
      publish:
        description: "Set to 'true' to publish to PyPI (version tags only)"
        required: false
        default: "false"

# Token-based PyPI publishing (pypa/gh-action-pypi-publish with PYPI_TOKEN
# secret), not OIDC trusted publishing, so id-token is not required. Jobs only
# read the repo and exchange build artifacts, so the default token only needs
# read access to repository contents.
permissions:
  contents: read

concurrency:
  # Include the event name so a manual workflow_dispatch (used to publish a
  # release) is not cancelled by the push-triggered build of the same ref, and
  # vice versa. Protected release branch push validations should also finish
  # every post-merge run, so use a run-specific group only for release push
  # events while keeping manual publish dispatches and other same-event runs
  # cancellable.
  group: >-
    ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')
        && format('{0}-{1}-{2}-{3}', github.workflow, github.ref, github.event_name, github.run_id)
        || format('{0}-{1}-{2}', github.workflow, github.ref, github.event_name) }}
  cancel-in-progress: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')) }}

jobs:
  check_format:
    name: Check format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.ref || github.sha }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Check format
        run: pixi run black --check --diff .

      - name: Check import
        run: pixi run isort --check --diff .

  build_wheels:
    name: ${{ matrix.os }}-${{ matrix.build }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux wheels no longer use a dedicated Docker image. The Pixi wheel
          # environments provide conda-forge compiler wrappers and a
          # sysroot_linux-64 2.28 baseline; auditwheel derives the final
          # manylinux tag from the bundled dependency ABI.
          - os: linux
            runner: ubuntu-24.04
            build: "cp313-manylinux_x86_64"
            pixi_env: py313-wheel
            experimental: false
            release_only: false

          - os: linux
            runner: ubuntu-24.04
            build: "cp312-manylinux_x86_64"
            pixi_env: py312-wheel
            experimental: false
            release_only: true

          - os: linux
            runner: ubuntu-24.04
            build: "cp311-manylinux_x86_64"
            pixi_env: py311-wheel
            experimental: false
            release_only: true

          - os: linux
            runner: ubuntu-24.04
            build: "cp310-manylinux_x86_64"
            pixi_env: py310-wheel
            experimental: false
            release_only: true

          # Pin macOS to macos-15 (not macos-latest): dependency packages are
          # built for the runner OS, and the wheel is repaired by delocate from
          # the Pixi environment instead of Homebrew.
          - os: macos
            runner: macos-15
            build: "cp313-macosx_arm64"
            pixi_env: py313-wheel
            experimental: false
            release_only: false

          - os: macos
            runner: macos-15
            build: "cp312-macosx_arm64"
            pixi_env: py312-wheel
            experimental: false
            release_only: true

          - os: windows
            runner: windows-2025-vs2026
            build: "cp313-win_amd64"
            pixi_env: py313-wheel
            experimental: false
            release_only: false

          - os: windows
            runner: windows-2025-vs2026
            build: "cp312-win_amd64"
            pixi_env: py312-wheel
            experimental: false
            release_only: true

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 8
      CMAKE_GENERATOR: ${{ matrix.os == 'windows' && 'Visual Studio 18 2026' || '' }}
      CMAKE_TOOLCHAIN_FILE: ""
      DART_PARALLEL_JOBS: 8
      DARTPY_REF: ${{ github.event.inputs.ref || github.ref }}
      DARTPY_CHECKOUT_REF: ${{ github.event.inputs.checkout_ref || github.event.inputs.ref || github.sha }}
      MACOSX_DEPLOYMENT_TARGET: "15.0"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.DARTPY_CHECKOUT_REF }}

      - name: Validate publish inputs
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
        run: |
          case "${DARTPY_REF}" in
            v*|refs/tags/v*) ;;
            *)
              echo "::error::When publish=true, ref must be a version tag (e.g. v6.17.0). Got '${DARTPY_REF}'."
              exit 1
              ;;
          esac

          tag="${DARTPY_REF#refs/tags/}"
          tag="${tag#v}"

          pkg_version="$(python -c 'import xml.etree.ElementTree as ET; print(ET.parse("package.xml").getroot().findtext("version", default="").strip())')"

          if [ -z "${pkg_version}" ]; then
            echo "::error::Failed to read version from package.xml in '${DARTPY_CHECKOUT_REF}'."
            exit 1
          fi

          if [ "${pkg_version}" != "${tag}" ]; then
            echo "::error::package.xml version '${pkg_version}' does not match tag '${tag}' (ref='${DARTPY_REF}', checkout_ref='${DARTPY_CHECKOUT_REF}')."
            exit 1
          fi

      - name: Decide wheel build
        id: wheel_gate
        run: |
          enabled=false
          if [ "${{ matrix.release_only }}" = "false" ]; then
            enabled=true
          else
            case "${DARTPY_REF}" in
              refs/heads/main|main|refs/heads/release-*|release-*|refs/tags/v*|v*)
                enabled=true
                ;;
            esac
          fi
          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

      - name: Set up pixi
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' && matrix.os != 'windows' }}
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          run-install: false

      - name: Set up pixi (Windows)
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' && matrix.os == 'windows' }}
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi.exe
          run-install: false

      - name: Install Pixi wheel environment
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' }}
        run: pixi install -e ${{ matrix.pixi_env }}

      - name: Build wheel
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' }}
        run: pixi run -e ${{ matrix.pixi_env }} wheel-build

      - name: Repair wheel
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' }}
        run: pixi run -e ${{ matrix.pixi_env }} wheel-repair

      - name: Verify wheel
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' }}
        run: pixi run -e ${{ matrix.pixi_env }} wheel-verify

      - name: Test wheel
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' }}
        run: pixi run -e ${{ matrix.pixi_env }} wheel-test

      - uses: actions/upload-artifact@v4
        if: ${{ steps.wheel_gate.outputs.enabled == 'true' }}
        with:
          path: ./dist/*.whl
          name: ${{ matrix.os }}-${{ matrix.build }}

  # TODO: Disabled because installing from source doesn't work when the deps are not
  # installed in the system
  # build_sdist:
  #   name: Build source distribution
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6

  #     - name: Build SDist
  #       run: pipx run build --sdist

  #     - uses: actions/upload-artifact@v4
  #       with:
  #         path: dist/*.tar.gz

  upload_pypi:
    # needs: [build_wheels, build_sdist]
    needs: [build_wheels]
    runs-on: ubuntu-latest
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # upload to PyPI on every tag starting with 'release-'
    # if: github.event_name == 'push' && startsWith(github.ref, 'release-')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')))
    steps:
      - uses: actions/download-artifact@v5
        with:
          # unpacks default artifact into dist/
          # if `name: artifact` is omitted, the action will create extra parent dir
          # name: artifact
          path: dist
          merge-multiple: true

      - name: List files in dist
        run: ls -lR dist/

      - uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          # To test: repository_url: https://test.pypi.org/legacy/
          skip-existing: true
