# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI gz-physics

on:
  push:
    branches:
      - "release-*"
  pull_request:
    branches:
      - "release-*"
  workflow_dispatch:

concurrency:
  # Protected main-branch and scheduled runs should not replace pending canaries.
  # GitHub's default concurrency queue keeps only one pending run, so use a
  # run-specific group for preserved refs while keeping PR/topic refs cancellable.
  group: >-
    ${{ (github.event_name == 'schedule' || github.ref == 'refs/heads/main')
        && format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.ref != 'refs/heads/main' }}

jobs:
  changes:
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    outputs:
      core_branch_push: ${{ steps.scope.outputs.core_branch_push }}
      code: ${{ steps.filter.outputs.code }}
      full_ci: ${{ steps.scope.outputs.full_ci }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ci-scope
        id: scope
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters/ci-code.yml

  test_gazebo:
    needs: changes
    if: >-
      (needs.changes.outputs.full_ci == 'true' ||
      needs.changes.outputs.core_branch_push == 'true') &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: GZ Physics Tests
    runs-on: ubuntu-latest
    env:
      # Keep parallelism modest to avoid process limits on shared runners.
      DART_PARALLEL_JOBS: 8
      # Avoid spawning too many ninja processes on shared runners (posix_spawn failures)
      CMAKE_BUILD_PARALLEL_LEVEL: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          environments: gazebo
          install-args: -e gazebo

      - name: Install apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 1.0

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Test gz-physics
        env:
          DART_PARALLEL_JOBS: 8
        run: |
          pixi r -e gazebo test-gz
