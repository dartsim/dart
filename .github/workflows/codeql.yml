# https://docs.github.com/en/code-security/code-scanning/introduction-to-code-scanning/about-codeql

name: CodeQL

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "docs/**"
      - ".github/workflows/update_lockfiles.yml"
      - ".readthedocs.yml"
      - "tutorials/**"
      - "**/*.md"
      - "**/*.rst"
      - "**/*.po"
      - "**/*.pot"
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - "docs/**"
      - ".github/workflows/update_lockfiles.yml"
      - ".readthedocs.yml"
      - "tutorials/**"
      - "**/*.md"
      - "**/*.rst"
      - "**/*.po"
      - "**/*.pot"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    name: Security | CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BUILD_TYPE: Release
      DART_VERBOSE: ON
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build_mode: manual
            run_build: true
            dartpy: "OFF"
            gui: "OFF"
            cmake_build_type: Debug
          - language: python
            build_mode: none
            run_build: false
            dartpy: "ON"
            gui: "ON"
            cmake_build_type: Release
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            else
              find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      # The C++ build plus the CodeQL database fills the ~14 GB free on the
      # default ubuntu-latest image (CodeQL DB creation fails with
      # "No space left on device"). Reclaim the large preinstalled toolchains
      # we do not use before building.
      - name: Free disk space
        if: matrix.run_build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Setup pixi (CI)
        if: matrix.run_build
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Configure environment for compiler cache
        if: matrix.run_build
        uses: ./.github/actions/configure-compiler-cache

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          config-file: ./.github/codeql/config.yml
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}

      - name: Configure (CMake)
        if: matrix.run_build
        env:
          DART_BUILD_GUI_OVERRIDE: ${{ matrix.gui }}
        run: |
          pixi run config ${{ matrix.dartpy }} ${{ matrix.cmake_build_type }}

      - name: Build
        if: matrix.run_build
        env:
          DART_BUILD_GUI_OVERRIDE: ${{ matrix.gui }}
          DART_PARALLEL_JOBS: "2"
        run: |
          BUILD_DIR="build/default/cpp/${{ matrix.cmake_build_type }}"
          pixi run python scripts/cmake_build.py \
            --build-dir "$BUILD_DIR" \
            --target dart_component_dart \
            --target dart-collision-native \
            --target dart-utils \
            --target dart-utils-urdf \
            --target dart-io \
            --target dart-simulation \
            --target dartsim_engine

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v4
        with:
          output: sarif-results
          upload: failure-only

      - name: Filter external dependency alerts
        run: |
          shopt -s nullglob
          sarif_files=(sarif-results/*.sarif)

          if (( ${#sarif_files[@]} == 0 )); then
            echo "No CodeQL SARIF files found." >&2
            exit 1
          fi

          for sarif in "${sarif_files[@]}"; do
            tmp="${sarif}.tmp"
            jq '
              def primary_uri:
                .locations[0].physicalLocation.artifactLocation.uri // "";

              def generated_or_dependency_path:
                gsub("\\\\"; "/")
                | (
                  test("(^|/)(\\.pixi|build|dist|\\.cache)(/|$)")
                  or test("(^|/)(third-party|external)(/|$)")
                );

              (.runs[]?.results) |= ((. // []) | map(
                select(
                  (primary_uri | generated_or_dependency_path)
                  | not
                )
              ))
            ' "$sarif" > "$tmp"
            mv "$tmp" "$sarif"
          done

      - name: Upload filtered CodeQL results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          wait-for-processing: "true"
