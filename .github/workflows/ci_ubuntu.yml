# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI Linux

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "0 2 * * 0,3"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.ref != 'refs/heads/main' }}

jobs:
  changes:
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    outputs:
      core_branch_push: ${{ steps.scope.outputs.core_branch_push }}
      code: ${{ steps.filter.outputs.code }}
      full_ci: ${{ steps.scope.outputs.full_ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ci-scope
        id: scope
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters/ci-code.yml

  coverage:
    needs: changes
    # Skip for workflow_dispatch; bypass changes gate for schedule (no file-change payload)
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      github.event_name != 'workflow_dispatch' &&
      (github.event_name == 'schedule' || needs.changes.outputs.code == 'true')
    name: Coverage (Debug)
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build and generate coverage report
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          pixi run coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-core:
    needs: changes
    if: needs.changes.outputs.core_branch_push == 'true' && needs.changes.outputs.code == 'true'
    name: Core Tests (Linux)
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Release C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run test ON Release

      - name: Run Release Python tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run test-py ON Release

      - name: Build Release examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run build-examples ON Release

      - name: Install
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run install

  build-release:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Release Tests
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Release C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run test ON Release

      - name: Run Release Python tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run test-py ON Release

      - name: Build Release examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run build-examples ON Release

      - name: Test with AddressSanitizer
        run: |
          DART_VERBOSE=ON \
          pixi run test-asan

      - name: Install
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run install

  native-collision-no-legacy:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Native Collision (no FCL/Bullet/ODE)
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      DART_PARALLEL_JOBS: 8
      CTEST_PARALLEL_LEVEL: 8
      DART_BUILD_COLLISION_REFERENCE_TESTS_OVERRIDE: OFF
      DART_BUILD_COLLISION_REFERENCE_BENCHMARKS_OVERRIDE: OFF
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Configure native-only collision build
        run: |
          DART_VERBOSE=ON \
          pixi run config

      - name: Build native collision and dartpy
        run: |
          pixi run -- cmake --build build/default/cpp/Release \
            --target \
              dart \
              dartpy \
              dart_collision_native_tests \
              INTEGRATION_simulation_World \
              UNIT_simulation_World \
              UNIT_collision_CollisionGroup \
              UNIT_collision_Raycast \
              UNIT_collision_DartCollisionDetector \
              UNIT_collision_CollisionBackend \
            --parallel "${DART_PARALLEL_JOBS}"

      - name: Test native collision and default detector paths
        run: |
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -L collision-native
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -R '^(UNIT_collision_CollisionGroup|UNIT_collision_Raycast|UNIT_collision_DartCollisionDetector|UNIT_collision_CollisionBackend)$'

      - name: Test dartpy native collision smoke
        run: |
          PYTHONPATH=build/default/cpp/Release/python \
            pixi run -- pytest -q \
              python/tests/unit/collision/test_collision.py \
              python/tests/unit/simulation/test_world.py

  collision-benchmark-guard:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    name: Collision Benchmark Guard
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      DART_PARALLEL_JOBS: 8
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          install-args: -e collision-reference

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run collision benchmark guard
        run: |
          pixi run --locked -e collision-reference bm-collision-check

      - name: Upload collision benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: collision-benchmark-guard-${{ github.run_id }}-${{ github.run_attempt }}
          path: .benchmark_results/collision_check_*.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

  build-debug:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Debug Tests
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Debug C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run test ON Debug

      - name: Run Debug Python tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          DART_BUILD_SIMULATION_EXPERIMENTAL_OVERRIDE=OFF \
          pixi run test-py ON Debug

  build-asserts:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Asserts enabled (no -DNDEBUG)
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build with assertions (no -DNDEBUG)
        run: |
          # NOTE: pixi tasks set BUILD_TYPE internally, so configure this
          # variant explicitly to ensure NDEBUG is not defined.
          pixi run -- bash -lc '
            set -euo pipefail
            BUILD_TYPE=None
            DART_VERBOSE=ON
            cmake \
              -G Ninja \
              -S . \
              -B build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
              -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
              -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
              -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
              -DDART_BUILD_DARTPY=ON \
              -DDART_BUILD_COLLISION_REFERENCE_TESTS=OFF \
              -DDART_BUILD_COLLISION_REFERENCE_BENCHMARKS=OFF \
              -DDART_BUILD_PROFILE=ON \
              -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
              -DDART_USE_SYSTEM_GOOGLETEST=ON \
              -DDART_USE_SYSTEM_IMGUI=ON \
              -DDART_USE_SYSTEM_TRACY=ON \
              -DDART_VERBOSE=$DART_VERBOSE
            cmake --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE -j
          '

  eigen-overalignment:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Eigen 64-byte alignment
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build and test with Eigen over-alignment
        run: |
          DART_VERBOSE=ON \
          pixi run test-eigen-overalignment

  headless-rendering:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Headless Rendering Tests
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb mesa-utils
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run build-examples

      - name: Run headless rendering test (rigid_cubes)
        run: |
          mkdir -p /tmp/headless_output
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" \
            ./build/default/cpp/Release/bin/rigid_cubes \
            --headless --frames 10 --out /tmp/headless_output
          echo "Captured frames:"
          ls -la /tmp/headless_output/
          test -f /tmp/headless_output/frame_000000.png
          test -f /tmp/headless_output/frame_000008.png
          file /tmp/headless_output/frame_000000.png | grep -q "PNG image data"
          echo "Headless rendering test passed!"

  vsg-rendering:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: VSG Visualization Tests
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev vulkan-tools mesa-vulkan-drivers
          version: 4

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build with VSG enabled
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          DART_BUILD_GUI_VSG_OVERRIDE=ON \
          pixi run build
          pixi run cmake --build build/default/cpp/Release \
            --parallel ${DART_PARALLEL_JOBS:-$(nproc)} \
            --target UNIT_gui_vsg_geometry_builders \
            --target UNIT_gui_vsg_debug_draw \
            --target UNIT_gui_vsg_simple_viewer \
            --target UNIT_gui_vsg_collision_scene_builder

      - name: Run VSG unit tests
        run: |
          ctest --test-dir build/default/cpp/Release \
            -R "UNIT_gui_vsg" \
            --output-on-failure \
            -j$(nproc)

      - name: Run collision_viz headless test
        run: |
          if [ -x ./build/default/cpp/Release/bin/collision_viz ]; then
            ./build/default/cpp/Release/bin/collision_viz --headless -o /tmp/collision_viz.ppm || \
              echo "collision_viz headless may require GPU - skipping"
            if [ -f /tmp/collision_viz.ppm ]; then
              echo "collision_viz headless test passed!"
              file /tmp/collision_viz.ppm
            fi
          else
            echo "collision_viz not built - skipping"
          fi

      - name: Run collision_sandbox headless
        run: |
          if [ -x ./build/default/cpp/Release/bin/collision_sandbox ]; then
            ./build/default/cpp/Release/bin/collision_sandbox --headless --frames 10 || \
              ./build/default/cpp/Release/bin/collision_sandbox --headless
          else
            echo "collision_sandbox not built - skipping"
          fi

  filament-gui-smoke:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Filament GUI Smoke (${{ matrix.compiler.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - name: GCC
            cc: gcc
            cxx: g++
          - name: Clang
            cc: clang
            cxx: clang++
    env:
      DART_PARALLEL_JOBS: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: g++ clang libgl1-mesa-dev libglu1-mesa-dev mesa-utils libc++-dev libc++abi-dev xvfb
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build and run Filament GUI smoke tests
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
        run: |
          DART_VERBOSE=ON \
          pixi run test-filament-gui-smoke
