  headless-rendering:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Headless Rendering Tests
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb mesa-utils
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run build-examples

      - name: Run headless rendering test (rigid_body)
        run: |
          mkdir -p /tmp/headless_output
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" \
            ./build/default/cpp/Release/bin/dart-demos \
            --scene rigid_body \
            --headless --frames 10 \
            --screenshot /tmp/headless_output/rigid_body.ppm
          echo "Captured image:"
          ls -la /tmp/headless_output/
          test -f /tmp/headless_output/rigid_body.ppm
          test "$(head -c 2 /tmp/headless_output/rigid_body.ppm)" = "P6"
          echo "Headless rendering test passed!"

      - name: Agent visual verification smoke
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          rm -rf /tmp/dart-agent-visual-smoke
          xvfb-run -a -s '-screen 0 640x480x24' \
            pixi run agent-capture -- \
              --scene box_on_ground --steps 250 --focus box --auto-views 1 \
              --layers contacts collision_bounds labels \
              --width 320 --height 240 \
              --out /tmp/dart-agent-visual-smoke --prefix smoke
          pixi run image-verdict -- \
            /tmp/dart-agent-visual-smoke/smoke_auto0.png
          xvfb-run -a -s '-screen 0 640x480x24' \
            env DART_REQUIRE_VISUAL_E2E=1 pixi run test-agent-visual-e2e

  filament-gui-smoke:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: DART GUI Smoke (${{ matrix.compiler.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - name: GCC
            cc: gcc
            cxx: g++
            extra_cxxflags: ""
          - name: Clang
            cc: clang
            cxx: clang++
            # Clang 18 reports __cpp_concepts=201907L, but libstdc++ 14 gates
            # std::expected (and other C++20/23 library features) behind
            # __cpp_concepts>=202002L, so std::expected is hidden and the build
            # fails (dart/common/result.hpp). Advertise the final C++20 concepts
            # value so libstdc++ exposes <expected>. This keeps the build on
            # libstdc++ -- ABI-matching the conda deps -- unlike -stdlib=libc++.
            extra_cxxflags: "-D__cpp_concepts=202002L -Wno-builtin-macro-redefined"
    env:
      DART_PARALLEL_JOBS: 2
      LIBCXX_PREFIX: ${{ github.workspace }}/.pixi/envs/default
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: g++ clang libgl1-mesa-dev libglu1-mesa-dev mesa-utils xvfb
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build and run DART GUI smoke tests
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
          CXXFLAGS: ${{ matrix.compiler.extra_cxxflags }}
        run: |
          DART_VERBOSE=ON \
          pixi run test-dart-gui-smoke
