# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI Linux

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "0 2 * * 0,3"
  workflow_dispatch:

concurrency:
  # Preserve scheduled/manual/tag evidence, but cancel superseded branch and PR
  # validations so rapid merge bursts converge on the latest ref tip.
  group: >-
    ${{ (github.event_name == 'schedule'
        || github.event_name == 'workflow_dispatch'
        || startsWith(github.ref, 'refs/tags/v'))
        && format('{0}-{1}-{2}-{3}', github.workflow, github.ref, github.event_name, github.run_id)
        || format('{0}-{1}-{2}', github.workflow, github.ref, github.event_name) }}
  cancel-in-progress: >-
    ${{ github.event_name != 'schedule'
        && github.event_name != 'workflow_dispatch'
        && !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  changes:
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    outputs:
      core_branch_push: ${{ steps.scope.outputs.core_branch_push }}
      code: ${{ steps.filter.outputs.code }}
      full_ci: ${{ steps.scope.outputs.full_ci }}
      open_pr: ${{ steps.open_pr.outputs.open_pr }}
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ci-scope
        id: scope
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters/ci-code.yml
      - name: Check for an open PR from this branch
        id: open_pr
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The branch-push core tier exists for pre-PR feedback. Once a PR is
          # open, the pull_request event already runs the full tier for every
          # push, so the push-tier core build would be redundant work. (Fork
          # pushes query the fork's own PR list and keep their fork-side push
          # CI, which runs on the fork's Actions quota.)
          #
          # Fail open: if gh is unavailable (e.g. a self-hosted parity runner)
          # or the query fails, fall back to running the core tier as before.
          # The headRepositoryOwner filter matters: --head matches by ref name
          # only, and a fork PR whose head branch shares this branch's name
          # must not suppress the upstream branch's core tier.
          count=0
          if command -v gh >/dev/null 2>&1; then
            count=$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$GITHUB_REF_NAME" \
              --state open \
              --json headRepositoryOwner \
              --jq "[.[] | select(.headRepositoryOwner.login == \"${GITHUB_REPOSITORY_OWNER}\")] | length" \
              2>/dev/null || echo 0)
          fi
          if [ "${count}" -gt 0 ] 2>/dev/null; then
            echo "open_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "open_pr=false" >> "$GITHUB_OUTPUT"
          fi

  coverage:
    needs: changes
    # Skip for workflow_dispatch; bypass changes gate for schedule (no file-change payload)
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      github.event_name != 'workflow_dispatch' &&
      (github.event_name == 'schedule' || needs.changes.outputs.code == 'true')
    name: Coverage (Debug)
    runs-on: ubuntu-latest
    env:
      # The Debug + --coverage build instruments every translation unit, using
      # materially more memory than a normal build; eight parallel jobs starve
      # the hosted runner ("lost communication with the server"). Keep
      # parallelism lower to avoid OOM kills (cf. the ASAN build below).
      DART_PARALLEL_JOBS: 4
    strategy:
      fail-fast: false
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      # The Debug + --coverage build instruments every translation unit, so its
      # object files (debug info + gcov arcs) are several times larger than a
      # normal build. With the simulation module now built by default, core +
      # simulation + all tests no longer fit in the
      # GitHub-hosted runner's free space and compilation fails with
      # "No space left on device". Reclaim the large preinstalled toolchains we
      # do not use (~25 GB) before configuring.
      - name: Free up disk space
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build and generate coverage report
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          pixi run coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.info
          flags: unittests
          name: codecov-umbrella
          disable_search: true
          plugins: noop
          fail_ci_if_error: false

  build-core:
    needs: changes
    if: >-
      needs.changes.outputs.core_branch_push == 'true' &&
      needs.changes.outputs.code == 'true' &&
      needs.changes.outputs.open_pr != 'true'
    name: Core Tests (Linux)
    runs-on: ubuntu-latest
    # Cap runaway/hung jobs well below the ~6h GitHub default.
    timeout-minutes: 90
    env:
      DART_PARALLEL_JOBS: 8
      # Parallelize the ctest phase. CI historically ran tests sequentially
      # (a DART 6-era default); DART 7's far larger suite makes that the
      # dominant CI cost. ctest honors CTEST_PARALLEL_LEVEL natively.
      CTEST_PARALLEL_LEVEL: 4
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Release C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run test ON Release

      - name: Run default differentiable OFF parity test
        run: |
          pixi run -- cmake --build build/default/cpp/Release \
            --target test_diff_zero_cost_parity \
            --parallel "${DART_PARALLEL_JOBS}"
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -R '^test_diff_zero_cost_parity$'

      - name: Run Release Python tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run test-py ON Release

      - name: Build Release examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run build-examples ON Release

      - name: Install
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run install

  build-release:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Release Tests
    runs-on: ubuntu-latest
    # This job is build-bound (Release build + dartpy + examples + install)
    # and runs ~60-70min warm, ~120-140min with fully cold caches; cap above
    # the cold case but well below the ~6h default so a genuine hang still
    # fails fast. The AddressSanitizer phase that used to run here serially
    # now lives in the separate ASAN Tests job below.
    timeout-minutes: 150
    env:
      DART_PARALLEL_JOBS: 8
      # Parallelize the ctest phase (see Core Tests). ctest honors this natively.
      CTEST_PARALLEL_LEVEL: 4
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      # The Release tree plus dartpy and examples runs close to the hosted
      # runner's free space. Reclaim unused preinstalled toolchains up front
      # so the build does not exhaust disk.
      - name: Free up disk space
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Release C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run test ON Release

      - name: Run default differentiable OFF parity test
        run: |
          pixi run -- cmake --build build/default/cpp/Release \
            --target test_diff_zero_cost_parity \
            --parallel "${DART_PARALLEL_JOBS}"
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -R '^test_diff_zero_cost_parity$'

      - name: Run Release Python tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run test-py ON Release

      - name: Build Release examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run build-examples ON Release

      - name: Install
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run install

  build-diff:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Differentiable Build (DART_BUILD_DIFF=ON)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BUILD_TYPE: Release
      DART_PARALLEL_JOBS: 8
      CTEST_PARALLEL_LEVEL: 4
      DART_BUILD_DIFF_OVERRIDE: ON
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Free up disk space
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Configure differentiable build
        run: |
          DART_VERBOSE=ON pixi run config ON Release

      - name: Build differentiable targets
        run: |
          pixi run -- cmake --build build/default/cpp/Release \
            --target \
              dartpy \
              test_diff_zero_cost_parity \
              test_diff_smooth_jacobian \
              test_diff_contact_jacobian \
              test_diff_public_contact_jacobian \
              test_diff_contact_gradient_modes \
              test_diff_apply_step_vjp \
              test_diff_parameter_jacobian \
              test_diff_rollout \
              test_diff_optimization \
              test_diff_paper_experiments \
              test_diff_dojo_style_ipm_spike \
            --parallel "${DART_PARALLEL_JOBS}"

      - name: Run differentiable C++ tests
        run: |
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -R '^test_diff_'

      - name: Run differentiable Python tests
        run: |
          PYTHONPATH=build/default/cpp/Release/python \
          DARTPY_RUNTIME_DIR=build/default/cpp/Release \
          pixi run -- pytest -q python/tests/unit/simulation/test_diff.py

  build-asan:
    needs: changes
    # The ASAN suite is compile-dominated: ~2h to build the instrumented tree
    # for ~2min of ctest. That cost gates no PR-local signal worth 2h per
    # push, so it runs as continuous coverage on protected branch pushes, the
    # scheduled runs, and manual dispatch. Need ASAN evidence on a branch
    # before merge? Trigger this workflow via workflow_dispatch on the branch.
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: ASAN Tests
    runs-on: ubuntu-latest
    # Sized above the observed ~2h cold build so a genuine hang still fails
    # well before the ~6h default kill.
    timeout-minutes: 210
    env:
      # ASAN builds use materially more memory than a normal Release build;
      # keep parallelism lower to avoid hosted-runner OOM kills.
      DART_PARALLEL_JOBS: 4
      # Parallelize the ctest phase (see Core Tests). ctest honors this natively.
      CTEST_PARALLEL_LEVEL: 4
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      # The instrumented ASAN tree keeps sanitizer metadata and debug info for
      # every test target; reclaim unused preinstalled toolchains so the build
      # does not exhaust the hosted runner's disk.
      - name: Free up disk space
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build and test with AddressSanitizer
        run: |
          DART_VERBOSE=ON \
          pixi run test-asan

  native-collision-no-legacy:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Native Collision (no FCL/Bullet/ODE)
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      DART_PARALLEL_JOBS: 8
      CTEST_PARALLEL_LEVEL: 8
      DART_BUILD_COLLISION_REFERENCE_TESTS_OVERRIDE: OFF
      DART_BUILD_COLLISION_REFERENCE_BENCHMARKS_OVERRIDE: OFF
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Configure native-only collision build
        run: |
          DART_VERBOSE=ON \
          pixi run config

      - name: Build native collision and dartpy
        run: |
          pixi run -- cmake --build build/default/cpp/Release \
            --target \
              dart \
              dartpy \
              dart_collision_native_tests \
              test_world \
              test_world_contact_parity \
              test_world_dart7_regression \
              UNIT_collision_CollisionGroup \
              UNIT_collision_Raycast \
              UNIT_collision_DartCollisionDetector \
              UNIT_collision_CollisionBackend \
            --parallel "${DART_PARALLEL_JOBS}"

      - name: Test native collision and default detector paths
        run: |
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -L collision-native
          pixi run -- ctest --test-dir build/default/cpp/Release \
            --output-on-failure \
            -R '^(UNIT_collision_CollisionGroup|UNIT_collision_Raycast|UNIT_collision_DartCollisionDetector|UNIT_collision_CollisionBackend)$'

      - name: Test dartpy native collision smoke
        run: |
          PYTHONPATH=build/default/cpp/Release/python \
            pixi run -- pytest -q \
              python/tests/unit/collision/test_collision.py \
              python/tests/unit/simulation/test_world.py

  collision-benchmark-guard:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    name: Collision Benchmark Guard
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      DART_PARALLEL_JOBS: 8
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          install-args: -e collision-reference

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run collision benchmark guard
        run: |
          pixi run --locked -e collision-reference bm-collision-check

      - name: Upload collision benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: collision-benchmark-guard-${{ github.run_id }}-${{ github.run_attempt }}
          path: .benchmark_results/collision_check_*.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

  build-debug:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Debug Tests
    runs-on: ubuntu-latest
    # The Debug job's dominant cost is the dartpy pybind11 build (see the
    # Python tests step), not the C++ ctest; parallel ctest plus a capped
    # dartpy build bring it well under the old ~6h. Generous cold-cache cap.
    timeout-minutes: 210
    env:
      DART_PARALLEL_JOBS: 8
      # Parallelize the ctest phase (see Core Tests). ctest honors this natively.
      CTEST_PARALLEL_LEVEL: 4
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      # The Debug build keeps full debug info for every test executable. Recent
      # full-CI runs can exhaust the GitHub-hosted runner before the final test
      # links complete, so reclaim large preinstalled toolchains we do not use.
      - name: Free up disk space
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev xvfb
          version: 3

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Debug C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          pixi run test ON Debug

      - name: Run Debug Python tests
        run: |
          # This step builds the dartpy nanobind extension. In Debug each
          # binding TU is large, so keep parallelism below the 16 GB hosted
          # runner's memory limit. Request mold for the final Debug module link
          # when it is present; CMake falls back to the default linker if the
          # runner image does not provide it. Keep this as a Debug dartpy smoke
          # path; Release and wheel jobs run the full Python suite.
          DART_USE_MOLD_OVERRIDE=ON \
          DARTPY_PYTEST_ARGS="-vv --tb=short" \
          DARTPY_PYTEST_SOURCES="unit/common/test_string.py unit/math/test_lcp.py unit/test_lifetime.py" \
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          DART_PARALLEL_JOBS=4 \
          pixi run test-py ON Debug

  build-asserts:
    needs: changes
    if: >-
      needs.changes.outputs.full_ci == 'true' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true')
    name: Asserts enabled (no -DNDEBUG)
    runs-on: ubuntu-latest
    env:
      DART_PARALLEL_JOBS: 8
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Build with assertions and Tracy profiling (no -DNDEBUG)
        run: |
          # NOTE: pixi tasks set BUILD_TYPE internally, so configure this
          # variant explicitly to ensure NDEBUG is not defined. This also
          # smoke-tests the fetched Tracy client path without installing Tracy
          # through Pixi package dependencies.
          pixi run -- bash -lc '
            set -euo pipefail
            BUILD_TYPE=None
            DART_VERBOSE=ON
            eval "HOST_LINKER_DEFS=($(python scripts/cmake_host_linker_flags.py))"
            cmake \
              -G Ninja \
              -S . \
              -B build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE \
              -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
              -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
              -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
              -DDART_BUILD_DARTPY=ON \
              -DDART_BUILD_COLLISION_REFERENCE_TESTS=OFF \
              -DDART_BUILD_COLLISION_REFERENCE_BENCHMARKS=OFF \
              -DDART_BUILD_PROFILE=ON \
              -DDART_PROFILE_TRACY=ON \
              -DDART_USE_SYSTEM_GOOGLEBENCHMARK=ON \
              -DDART_USE_SYSTEM_GOOGLETEST=ON \
              -DDART_USE_SYSTEM_IMGUI=ON \
              -DDART_USE_SYSTEM_TRACY=OFF \
              -DDART_VERBOSE=$DART_VERBOSE \
              ${HOST_LINKER_DEFS[@]+"${HOST_LINKER_DEFS[@]}"}
            cmake --build build/$PIXI_ENVIRONMENT_NAME/cpp/$BUILD_TYPE -j
          '

