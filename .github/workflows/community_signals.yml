name: Community Signals Dashboard

# Publishes a compact public dashboard for repository activity, package
# downloads, citations, and downstream freshness. The generated dashboard is
# served from GitHub Pages at https://dartsim.github.io/dart/community-signals/.
#
# GitHub traffic endpoints may require a fine-grained token with repository
# Administration read permission. If the default GITHUB_TOKEN cannot read those
# endpoints, set a DART_STATS_TOKEN repository secret; the dashboard still
# publishes with traffic marked unavailable when neither token works.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/community_signals.yml"
      - "docs/readthedocs/community/community_signals.rst"
      - "docs/readthedocs/index.rst"
      - "scripts/generate_community_signals_dashboard.py"
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: community-signals-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish community signals
    runs-on: [self-hosted, Linux, X64, dartsim, docker]
    env:
      DART_STATS_GITHUB_TOKEN: ${{ secrets.DART_STATS_TOKEN || github.token }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Generate dashboard
        run: |
          python scripts/generate_community_signals_dashboard.py \
            --output build/community-signals

      - name: Publish to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git worktree prune

          worktree_parent="$(mktemp -d "${RUNNER_TEMP:-/tmp}/community-signals-gh-pages.XXXXXX")"
          worktree_dir="${worktree_parent}/worktree"

          cleanup() {
            git worktree remove --force "${worktree_dir}" >/dev/null 2>&1 || true
            rm -rf "${worktree_parent}"
            git worktree prune
          }
          trap cleanup EXIT

          git worktree add "${worktree_dir}" origin/gh-pages

          rm -rf "${worktree_dir}/community-signals"
          mkdir -p "${worktree_dir}/community-signals"
          cp -R build/community-signals/. "${worktree_dir}/community-signals/"
          touch "${worktree_dir}/.nojekyll"

          git -C "${worktree_dir}" config user.name "github-actions[bot]"
          git -C "${worktree_dir}" config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${worktree_dir}" add .nojekyll community-signals

          if git -C "${worktree_dir}" diff --cached --quiet; then
            echo "Community signals dashboard is unchanged."
            exit 0
          fi

          git -C "${worktree_dir}" commit -m "Update community signals dashboard"
          git -C "${worktree_dir}" push origin HEAD:gh-pages
