# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI Windows

on:
  push:
    # Feature-branch validation happens via pull_request; run on push only for
    # the release lines so PR branches are not built twice per push.
    branches:
      - "release-*"
  pull_request:
    branches:
      - "**"
  schedule:
    # Cron syntax: [minute hour day_of_the_month month day_of_the_week]
    - cron: "0 2 * * 0,3" # Run every Sunday and Wednesday at 02:00
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Protected release branches should finish every post-merge validation run.
  # GitHub's default concurrency queue keeps only one pending run, so use a
  # run-specific group on release refs while keeping PR/topic refs cancellable.
  group: >-
    ${{ startsWith(github.ref, 'refs/heads/release-')
        && format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && !startsWith(github.ref, 'refs/heads/release-') }}

jobs:
  build:
    name: ${{ matrix.build_type }}
    runs-on: windows-2025-vs2026
    env:
      CMAKE_GENERATOR: Visual Studio 18 2026
    # Keep the job bounded, but allow large native-collision PRs enough time
    # for MSVC Release test linking on hosted runners. Release-branch Windows
    # builds can exceed three hours on cold hosted runners after the DART 6.20
    # native-collision test expansion.
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        build_type: ["Release"] # TODO: Add Debug
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi.exe

      - name: Native Windows hook smoke
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          pixi run python -c "import sys; print(sys.executable)"
          $launcher = Join-Path $env:GITHUB_WORKSPACE ".claude/hooks/pre-commit-guard.ps1"
          # The malformed probe writes expected native stderr. PowerShell 5.1
          # must continue long enough to preserve and assert the exit code.
          $ErrorActionPreference = "Continue"
          '{"tool_input":{"command":"git status"}}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $launcher
          $successExit = $LASTEXITCODE
          if ($successExit -ne 0) {
            throw "non-commit hook payload exited $successExit instead of 0"
          }
          $env:DART_HOOK_DRY_RUN = "1"
          '{"tool_input":{"command":"git commit --no-verify -m x"}}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $launcher
          $diagnosticExit = $LASTEXITCODE
          Remove-Item Env:DART_HOOK_DRY_RUN
          if ($diagnosticExit -ne 0) {
            throw "successful diagnostic hook payload exited $diagnosticExit instead of 0"
          }
          '{}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $launcher
          $blockedExit = $LASTEXITCODE
          $ErrorActionPreference = "Stop"
          if ($blockedExit -ne 2) {
            throw "malformed hook payload exited $blockedExit instead of 2"
          }
          cmd.exe /c exit 0

      - name: Check Lint
        run: |
          pixi run check-lint

      - name: Test DART and dartpy
        run: |
          $env:DART_VERBOSE = "ON"; `
          $env:BUILD_TYPE = "${{ matrix.build_type }}"; `
          pixi run test-all

      # Linux CI covers install. On Windows, pixi run install configures a
      # separate install build tree after test-all has already passed, which
      # duplicates work and can keep the protected-branch runner busy for hours.
