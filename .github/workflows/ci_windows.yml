# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI Windows

on:
  push:
    # Feature-branch validation happens via pull_request; run on push only for
    # the release lines so PR branches are not built twice per push.
    branches:
      - "release-*"
    paths-ignore:
      - ".github/workflows/cache_*.yml"
      - "docker/dev/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - ".github/workflows/cache_*.yml"
      - "docker/dev/**"
  schedule:
    # Cron syntax: [minute hour day_of_the_month month day_of_the_week]
    - cron: "0 2 * * 0,3" # Run every Sunday and Wednesday at 02:00
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Protected release branches should finish every post-merge validation run.
  # GitHub's default concurrency queue keeps only one pending run, so use a
  # run-specific group on release refs while keeping PR/topic refs cancellable.
  group: >-
    ${{ startsWith(github.ref, 'refs/heads/release-')
        && format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && !startsWith(github.ref, 'refs/heads/release-') }}

jobs:
  build:
    name: ${{ matrix.build_type }}
    runs-on: windows-2025-vs2026
    env:
      CMAKE_GENERATOR: Visual Studio 18 2026
    # Fail fast on hung Windows jobs instead of consuming the protected-branch
    # runner indefinitely.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        build_type: ["Release"] # TODO: Add Debug
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi.exe

      - name: Check Lint
        run: |
          pixi run check-lint

      - name: Test DART and dartpy
        run: |
          $env:DART_VERBOSE = "ON"; `
          $env:BUILD_TYPE = "${{ matrix.build_type }}"; `
          pixi run test-all

      # Linux CI covers install. On Windows, pixi run install configures a
      # separate install build tree after test-all has already passed, which
      # duplicates work and can keep the protected-branch runner busy for hours.
