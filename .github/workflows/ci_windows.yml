# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI Windows

on:
  push:
    branches:
      - "main"
      - "release-*"
  pull_request:
    branches:
      - "**"
  schedule:
    # Offset from ci_ubuntu (02:00) and ci_macos (02:40) so the scheduled runs
    # do not stampede the shared/hosted runner pools simultaneously.
    - cron: "20 2 * * 0,3"
  workflow_dispatch:

concurrency:
  # Preserve scheduled/manual/tag evidence, but cancel superseded branch and PR
  # validations so rapid merge bursts converge on the latest ref tip.
  group: >-
    ${{ (github.event_name == 'schedule'
        || github.event_name == 'workflow_dispatch'
        || startsWith(github.ref, 'refs/tags/v'))
        && format('{0}-{1}-{2}-{3}', github.workflow, github.ref, github.event_name, github.run_id)
        || format('{0}-{1}-{2}', github.workflow, github.ref, github.event_name) }}
  cancel-in-progress: >-
    ${{ github.event_name != 'schedule'
        && github.event_name != 'workflow_dispatch'
        && !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters/ci-code.yml

  build:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true'
    name: Tests (${{ matrix.build_type }})
    runs-on: windows-2025-vs2026
    env:
      # Pin the VS 2026 image required by DART's Windows toolchain floor.
      DART_WINDOWS_CMAKE_GENERATOR: Visual Studio 18 2026
      # Parallelize the ctest phase; the serial suite (incl. the ~350s long
      # pole) dominated the Windows job's ~90min wall-clock.
      CTEST_PARALLEL_LEVEL: 4
    # Fail fast on a regression instead of waiting for the ~6h default kill.
    # Sized generously for a first cold-sccache Ninja build.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        build_type: ["Release"] # Windows CI keeps Release-only to keep runtimes acceptable
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          cache: false
          run-install: false
          self-hosted-install: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi.exe

      - name: Native Windows hook smoke
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          pixi run python -c "import sys; print(sys.executable)"
          $launcher = Join-Path $env:GITHUB_WORKSPACE ".claude/hooks/pre-commit-guard.ps1"
          $hookCommand = '$payload = [Console]::In.ReadToEnd(); $payload | & (Join-Path (git rev-parse --show-toplevel) ''.claude/hooks/pre-commit-guard.ps1''); if (-not $?) { exit 2 }; if ($LASTEXITCODE -ne 0) { exit 2 }; exit 0'
          # The malformed probe writes expected native stderr. PowerShell 5.1
          # must continue long enough to preserve and assert the exit code.
          $ErrorActionPreference = "Continue"
          '{"tool_input":{"command":"git status"}}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command $hookCommand
          $successExit = $LASTEXITCODE
          if ($successExit -ne 0) {
            throw "non-commit hook payload exited $successExit instead of 0"
          }
          $env:DART_HOOK_DRY_RUN = "1"
          $diagnosticOutput = '{"tool_input":{"command":"git commit --no-verify -m x"}}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command $hookCommand 2>&1
          $diagnosticExit = $LASTEXITCODE
          Remove-Item Env:DART_HOOK_DRY_RUN
          if ($diagnosticExit -ne 0) {
            throw "successful diagnostic hook payload exited $diagnosticExit instead of 0"
          }
          if (-not (($diagnosticOutput -join [Environment]::NewLine) -match "check_agent_hook.py --profile staged")) {
            throw "diagnostic hook payload did not reach the staged gate"
          }
          '{}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command $hookCommand
          $blockedExit = $LASTEXITCODE
          '{"tool_input":{"command":"git status"}}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $launcher
          $rawSuccessExit = $LASTEXITCODE
          '{}' |
            powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $launcher
          $rawBlockedExit = $LASTEXITCODE
          $ErrorActionPreference = "Stop"
          if ($blockedExit -ne 2) {
            throw "malformed hook payload exited $blockedExit instead of 2"
          }
          if ($rawSuccessExit -ne 0 -or $rawBlockedExit -ne 2) {
            throw "raw-stdin fallback exited $rawSuccessExit/$rawBlockedExit instead of 0/2"
          }
          cmd.exe /c exit 0

      - name: Configure environment for compiler cache
        shell: powershell
        run: |
          if ($env:ACTIONS_CACHE_URL) {
            echo "SCCACHE_GHA_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "SCCACHE_GHA_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          echo "SCCACHE_NO_DAEMON=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "DART_COMPILER_CACHE=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($env:SCCACHE_PATH) {
            echo "CMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "CMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          $ccacheDir = Join-Path $env:RUNNER_TEMP "ccache"
          New-Item -ItemType Directory -Force -Path $ccacheDir | Out-Null
          echo "CCACHE_BASEDIR=$env:GITHUB_WORKSPACE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_DIR=$ccacheDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_COMPRESS=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CCACHE_MAXSIZE=5G" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Lint checks are centralized in ci_lint.yml.

      - name: Test DART (dartpy disabled)
        run: |
          $ErrorActionPreference = "Stop"
          $env:DART_VERBOSE = "ON"
          $env:BUILD_TYPE = "${{ matrix.build_type }}"
          pixi run test-no-plane OFF

      # Skip install on Windows to keep job runtimes within limits; Linux covers install path.
