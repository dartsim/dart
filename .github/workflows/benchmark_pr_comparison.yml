name: Benchmark PR Comparison

# Opt-in per-PR benchmark comparison comment (PLAN-080 follow-on). Reuses the
# Performance Dashboard's benchmark slice and its github-action-benchmark
# gh-pages history (published by performance_dashboard.yml) as the baseline, then
# posts a "moved by N%" comparison against that baseline on the PR. This is a
# read-only consumer of the dashboard data, not a second publishing pipeline:
# it never writes to gh-pages (save-data-file/auto-push are false).
#
# Gradual rollout (PLAN-080): the job is gated to same-repo PRs carrying the
# `benchmark` label, so ordinary PRs pay no benchmark cost. Fork PRs are skipped
# because their GITHUB_TOKEN is read-only and cannot post a comment, and running
# fork code on the benchmark path is out of scope for the initial rollout.
#
# NOTE: the exact comment placement (commit vs PR thread) and the noise/alert
# threshold must be validated on a real labeled PR run; tune `alert-threshold`
# once review-noise tradeoffs are visible, and expand beyond the dashboard slice
# only after that.

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-pr-comparison-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compare:
    name: Benchmark comparison comment
    # Same-repo PRs only (fork PRs get a read-only token and cannot comment), and
    # opt-in via the `benchmark` label to keep ordinary PRs cost-free.
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'benchmark')
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          environments: collision-reference
          install-args: -e collision-reference

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      # Match the dashboard build toggles so the PR slice is comparable to the
      # published baseline.
      - name: Configure build
        env:
          DART_BUILD_GUI_OVERRIDE: "OFF"
          DART_BUILD_EXAMPLES_OVERRIDE: "OFF"
          DART_BUILD_TUTORIALS_OVERRIDE: "OFF"
          DART_BUILD_DARTPY_OVERRIDE: "OFF"
        run: |
          pixi run --locked -e collision-reference config

      - name: Run benchmark surfaces
        # Same slice as the dashboard so the comparison is apples-to-apples
        # against the published gh-pages baseline. Tolerate a flaky surface.
        run: |
          pixi run --locked -e collision-reference \
            python scripts/run_performance_dashboard_benchmarks.py --continue-on-error || true

      - name: Merge benchmark results
        run: |
          pixi run --locked -e collision-reference \
            python scripts/merge_benchmark_results.py .benchmark_results \
            --output .benchmark_results/combined.json

      - name: Compare against dashboard baseline and comment
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DART Experimental World Performance
          tool: googlecpp
          output-file-path: .benchmark_results/combined.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: performance
          # Read-only consumer: never write PR results to gh-pages history.
          save-data-file: false
          auto-push: false
          # Always post the comparison so the PR shows the delta even when it is
          # below the alert threshold. GitHub-hosted runners are noisy; start at
          # a conservative threshold and tune once noise tradeoffs are visible.
          comment-always: true
          alert-threshold: "150%"
          fail-on-alert: false
          max-items-in-chart: 250
