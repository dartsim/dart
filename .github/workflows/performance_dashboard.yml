name: Performance Dashboard

on:
  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/performance_dashboard.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "dart/**"
      - "data/**"
      - "pixi.lock"
      - "pixi.toml"
      - "scripts/*performance_dashboard*.py"
      - "scripts/check_collision_benchmarks.py"
      - "scripts/report_performance_to_bencher.py"
      - "scripts/run_cpp_benchmark.py"
      - "scripts/summarize_performance_dashboard.py"
      - "scripts/verify_performance_dashboard.py"
      - "tests/benchmark/**"
  schedule:
    - cron: "30 3 * * 0,3"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pages: write

concurrency:
  group: performance-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-performance-dashboard:
    name: Publish Performance Dashboard
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      DART_PARALLEL_JOBS: 8
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Checkout Pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          environments: collision-reference
          install-args: -e collision-reference

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Verify Pages configuration
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pixi run --locked -e collision-reference python scripts/check_performance_dashboard_pages_config.py \
            --repo "${GITHUB_REPOSITORY}"

      - name: Download seed benchmark artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pixi run --locked -e collision-reference python scripts/download_performance_dashboard_artifacts.py \
            --repo "${GITHUB_REPOSITORY}" \
            --output-dir .benchmark_seed \
            --branch "${GITHUB_REF_NAME}" \
            --limit 3 \
            --skip-if-unavailable

      - name: Run collision benchmarks
        continue-on-error: true
        run: |
          pixi run --locked -e collision-reference bm-collision-check

      - name: Run dashboard surface benchmarks
        continue-on-error: true
        run: |
          pixi run --locked -e collision-reference bm-dashboard-surfaces --continue-on-error

      - name: Generate performance dashboard
        if: always()
        run: |
          seed_args=()
          for seed_dir in .benchmark_seed/*; do
            if [ -d "${seed_dir}" ]; then
              seed_args+=(--seed-input "${seed_dir}")
            fi
          done
          pixi run --locked -e collision-reference python scripts/generate_performance_dashboard.py \
            --input .benchmark_results \
            --output-dir gh-pages/performance \
            --history gh-pages/performance/data.json \
            --clean-output \
            "${seed_args[@]}" \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --branch "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --source-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --testbed "github-${RUNNER_OS}-${RUNNER_ARCH}" \
            --allow-empty

      - name: Verify performance dashboard
        if: always()
        run: |
          pixi run --locked -e collision-reference python scripts/verify_performance_dashboard.py \
            gh-pages/performance

      - name: Summarize performance dashboard
        if: always()
        env:
          BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
        run: |
          bencher_args=()
          if [ -n "${BENCHER_PROJECT}" ]; then
            bencher_args+=(--bencher-configured)
          fi
          pixi run --locked -e collision-reference python scripts/summarize_performance_dashboard.py \
            gh-pages/performance/status.json \
            --summary-file "${GITHUB_STEP_SUMMARY}" \
            "${bencher_args[@]}"

      - name: Upload raw benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-dashboard-raw-${{ github.run_id }}-${{ github.run_attempt }}
          path: .benchmark_results/*.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-dashboard-site-${{ github.run_id }}-${{ github.run_attempt }}
          path: gh-pages/performance
          if-no-files-found: warn
          retention-days: 14

      - name: Setup Bencher CLI
        if: github.ref == 'refs/heads/main' && vars.BENCHER_PROJECT != ''
        continue-on-error: true
        uses: bencherdev/bencher@v0.6.6

      - name: Report benchmark JSON to Bencher
        if: github.ref == 'refs/heads/main' && vars.BENCHER_PROJECT != ''
        continue-on-error: true
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
          BENCHER_HOST: ${{ vars.BENCHER_HOST }}
          BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
        run: |
          pixi run --locked -e collision-reference python scripts/report_performance_to_bencher.py \
            --input '.benchmark_results/*.json' \
            --skip-if-unconfigured \
            --skip-if-no-input

      - name: Publish dashboard to gh-pages
        id: publish_dashboard
        if: github.ref == 'refs/heads/main'
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add performance
          if git diff --cached --quiet; then
            echo "No performance dashboard changes to publish."
            echo "published=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git commit -m "Update performance dashboard"
          git push origin HEAD:gh-pages
          echo "published=true" >> "${GITHUB_OUTPUT}"

      - name: Request GitHub Pages build
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/pages/builds"

      - name: Verify published dashboard endpoint
        if: github.ref == 'refs/heads/main'
        run: |
          pixi run --locked -e collision-reference python scripts/check_performance_dashboard_endpoint.py \
            https://dartsim.github.io/dart/performance/status.json \
            --expect-status-file gh-pages/performance/status.json \
            --expect-data-file gh-pages/performance/data.json \
            --expect-dashboard-file gh-pages/performance/index.html \
            --expect-summary-file gh-pages/performance/summary.md \
            --require-dashboard-page \
            --require-summary \
            --require-fresh \
            --attempts 60 \
            --interval 15
