name: Performance Dashboard

# Runs DART's Google Benchmark suites and publishes the results with
# benchmark-action/github-action-benchmark. The action stores history on the
# gh-pages branch and renders an interactive Chart.js dashboard at
# https://dartsim.github.io/dart/performance/. Everything stays on GitHub
# infrastructure: no external account, token, or service to maintain.

on:
  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/performance_dashboard.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "dart/**"
      - "pixi.lock"
      - "pixi.toml"
      - "scripts/benchmark_display_names.py"
      - "scripts/check_compute_graph_benchmarks.py"
      - "scripts/merge_benchmark_results.py"
      - "scripts/run_cpp_benchmark.py"
      - "scripts/run_performance_dashboard_benchmarks.py"
      - "tests/benchmark/**"
  schedule:
    - cron: "30 3 * * 0,3"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: performance-dashboard
  cancel-in-progress: false

jobs:
  publish:
    name: Publish performance dashboard
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          environments: collision-reference
          install-args: -e collision-reference

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libgl1-mesa-dev libglu1-mesa-dev
          version: 2

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      # Configure the CMake build (no GUI/examples/tutorials/dartpy) so the
      # benchmark targets can be built. run_cpp_benchmark.py builds each target
      # but requires the build directory to already be configured.
      - name: Configure build
        env:
          DART_BUILD_GUI_OVERRIDE: "OFF"
          DART_BUILD_EXAMPLES_OVERRIDE: "OFF"
          DART_BUILD_TUTORIALS_OVERRIDE: "OFF"
          DART_BUILD_DARTPY_OVERRIDE: "OFF"
        run: |
          pixi run --locked -e collision-reference config

      - name: Run benchmark surfaces
        # Tolerate a flaky surface: publish whatever produced results. The merge
        # step below fails only if no benchmark rows were produced at all.
        run: |
          pixi run --locked -e collision-reference \
            python scripts/run_performance_dashboard_benchmarks.py --continue-on-error || true

      - name: Check compute benchmark gate
        # This is a coverage/correctness gate for the scalable-compute benchmark
        # surface, not a speedup threshold. Keep the noisy speedup sanity check
        # in `pixi run bm-compute-check`, and keep this JSON outside
        # .benchmark_results so the merge step does not publish duplicate rows.
        run: |
          pixi run --locked -e collision-reference \
            python scripts/check_compute_graph_benchmarks.py \
              --skip-contact-island-speedup-check \
              --output build/compute_graph_check.json

      - name: Merge benchmark results
        # --humanize rewrites raw Google Benchmark names into readable chart
        # titles for the published dashboard (the run-time --benchmark_filter and
        # the compute-graph gate above keep using the raw names).
        run: |
          pixi run --locked -e collision-reference \
            python scripts/merge_benchmark_results.py .benchmark_results \
            --output .benchmark_results/combined.json --humanize

      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DART 7 World Performance
          tool: googlecpp
          output-file-path: .benchmark_results/combined.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: performance
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # GitHub-hosted runners are noisy; alert on a clear 2x regression
          # and comment on the commit rather than failing the build.
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false
          # Keep the gh-pages data file bounded over the project's lifetime.
          max-items-in-chart: 250
