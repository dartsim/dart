# https://help.github.com/en/articles/workflow-syntax-for-github-actions

name: CI macOS

on:
  push:
    branches:
      - "main"
      - "release-*"
  pull_request:
    branches:
      - "**"
  schedule:
    # Offset from ci_ubuntu (02:00) and ci_windows (02:20) so the scheduled
    # runs do not stampede the shared/hosted runner pools simultaneously.
    - cron: "40 2 * * 0,3"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters/ci-code.yml

  build-release:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true'
    name: Release Tests (arm64)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      # Parallelize the ctest phase (CI previously ran tests sequentially).
      CTEST_PARALLEL_LEVEL: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          # Avoid cache key generation failures on macOS self-hosted runners
          cache: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          sccache-continue-on-error: true

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Release C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run test ON Release

      - name: Run Release Python tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run test-py ON Release

      - name: Build Release examples
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run build-examples ON Release

      - name: Install
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Release \
          pixi run install

  build-debug:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true'
    name: Debug Tests (arm64)
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      # Parallelize the ctest phase (CI previously ran tests sequentially).
      CTEST_PARALLEL_LEVEL: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CI)
        uses: ./.github/actions/setup-pixi-ci
        with:
          # Avoid cache key generation failures on macOS self-hosted runners
          cache: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          sccache-continue-on-error: true

      - name: Configure environment for compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Run Debug C++ tests
        run: |
          DART_VERBOSE=ON \
          BUILD_TYPE=Debug \
          DART_BUILD_DARTPY_OVERRIDE=OFF \
          pixi run test ON Debug
