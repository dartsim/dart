name: CI CUDA

on:
  push:
    branches:
      - main
      - "release-*"
    paths:
      - ".github/actions/configure-compiler-cache/**"
      - ".github/actions/setup-pixi-ci/**"
      - ".github/workflows/ci_cuda.yml"
      - "CMakeLists.txt"
      - "dart/simulation/**"
      - "pixi.lock"
      - "pixi.toml"
      - "scripts/cmake_build.py"
      - "tests/benchmark/simulation/**"
      - "tests/unit/simulation/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/actions/configure-compiler-cache/**"
      - ".github/actions/setup-pixi-ci/**"
      - ".github/workflows/ci_cuda.yml"
      - "CMakeLists.txt"
      - "dart/simulation/**"
      - "pixi.lock"
      - "pixi.toml"
      - "scripts/cmake_build.py"
      - "tests/benchmark/simulation/**"
      - "tests/unit/simulation/**"
  workflow_dispatch:

concurrency:
  # Protected main/release-branch runs should not replace pending validation runs.
  # GitHub's default concurrency queue keeps only one pending run, so use a
  # run-specific group for preserved refs while keeping PR/topic refs cancellable.
  group: >-
    ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-'))
        && format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: >-
    ${{ github.ref != 'refs/heads/main'
        && !startsWith(github.ref, 'refs/heads/release-') }}

permissions:
  contents: read

jobs:
  cuda-build:
    name: CUDA Build
    # Security: `ubuntu-latest-gpu` is a long-lived self-hosted runner. Never run
    # untrusted fork-PR code on it. Fork PRs still run this required check on a
    # GitHub-hosted runner as a CUDA compile fallback; trusted same-repo events
    # use the GPU runner and additionally execute the CUDA tests.
    runs-on: >-
      ${{
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository &&
        'ubuntu-latest' ||
        'ubuntu-latest-gpu'
      }}
    # A cold build of the CUDA library + kernels + tests runs ~60 min and used to
    # land right on a 60-minute cap. With the persistent self-hosted ccache dir
    # (configure-compiler-cache action) warm builds finish in a fraction of this;
    # 90 minutes is a safety net for genuinely-cold runs (e.g. the first run after
    # the runner image is recreated and the cache is empty).
    timeout-minutes: 90
    env:
      DART_PARALLEL_JOBS: "8"
      CTEST_PARALLEL_LEVEL: "8"
      DART_CUDA_ARCHITECTURES: "75"
    steps:
      - name: Clean stale Linux workspace
        if: runner.os == 'Linux'
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ "${GITHUB_WORKSPACE}" != "/" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || {
              if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" alpine:3.20 sh -c \
                  'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
              else
                echo "::warning::Unable to clean stale workspace entries before checkout."
              fi
            }
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pixi (CUDA)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          environments: cuda
          install-args: -e cuda

      - name: Check CUDA toolkit
        run: pixi run --locked -e cuda nvcc --version

      - name: Configure compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Show GPU (nvidia-smi)
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        run: nvidia-smi

      - name: Build CUDA targets
        run: pixi run --locked -e cuda build-cuda

      - name: Run CUDA tests on GPU
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        run: pixi run --locked -e cuda test-cuda
