name: CI CUDA

on:
  push:
    branches:
      - main
      - "release-*"
    paths:
      - ".github/actions/configure-compiler-cache/**"
      - ".github/actions/setup-pixi-ci/**"
      - ".github/workflows/ci_cuda.yml"
      - "CMakeLists.txt"
      - "dart/simulation/experimental/**"
      - "pixi.lock"
      - "pixi.toml"
      - "scripts/cmake_build.py"
      - "tests/benchmark/simulation/experimental/**"
      - "tests/unit/simulation/experimental/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/actions/configure-compiler-cache/**"
      - ".github/actions/setup-pixi-ci/**"
      - ".github/workflows/ci_cuda.yml"
      - "CMakeLists.txt"
      - "dart/simulation/experimental/**"
      - "pixi.lock"
      - "pixi.toml"
      - "scripts/cmake_build.py"
      - "tests/benchmark/simulation/experimental/**"
      - "tests/unit/simulation/experimental/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cuda-build:
    name: CUDA Build
    # Security: `ubuntu-latest-gpu` is a long-lived self-hosted runner. Never run
    # untrusted fork-PR code on it. Run only for push/workflow_dispatch, or for
    # pull requests whose head is a branch in THIS repository (not a fork);
    # fork PRs skip the CUDA job rather than executing on self-hosted hardware.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    # Runs on the self-hosted GPU runner (label `ubuntu-latest-gpu`) so CUDA
    # targets are built AND executed against a real NVIDIA GPU. General jobs use
    # the `ubuntu-latest` self-hosted runners; only CUDA work is routed here.
    runs-on: ubuntu-latest-gpu
    timeout-minutes: 60
    env:
      DART_PARALLEL_JOBS: "8"
      CTEST_PARALLEL_LEVEL: "8"
      DART_CUDA_ARCHITECTURES: "75"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi (CUDA)
        uses: ./.github/actions/setup-pixi-ci
        with:
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
          environments: cuda
          install-args: -e cuda

      - name: Check CUDA toolkit
        run: pixi run --locked -e cuda nvcc --version

      - name: Configure compiler cache
        uses: ./.github/actions/configure-compiler-cache

      - name: Show GPU (nvidia-smi)
        run: nvidia-smi

      - name: Build CUDA targets
        run: pixi run --locked -e cuda build-cuda

      - name: Run CUDA tests on GPU
        run: pixi run --locked -e cuda test-cuda
