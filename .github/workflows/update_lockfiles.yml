name: Update Lock Files

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: 0 5 * * SAT # Runs at 05:00 every Saturday

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-base-branches:
    name: Maintenance | Discover lockfile bases
    runs-on: ubuntu-latest
    outputs:
      bases: ${{ steps.branches.outputs.bases }}
    steps:
      - name: Discover latest DART 6 release branch
        id: branches
        shell: bash
        run: |
          set -euo pipefail

          release_branch=$(
            git ls-remote --heads "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" "release-6.*" |
              awk '{ sub("refs/heads/", "", $2); print $2 }' |
              sort -V |
              tail -n 1
          )

          if [ -z "${release_branch}" ]; then
            echo "No release-6.* branch found" >&2
            exit 1
          fi

          printf 'bases=["main","%s"]\n' "${release_branch}" >> "${GITHUB_OUTPUT}"

  pixi-update:
    name: Maintenance | Update pixi.lock (${{ matrix.base }})
    needs: discover-base-branches
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.base }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base: ${{ fromJSON(needs.discover-base-branches.outputs.bases) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.base }}
      - name: Setup pixi (CI)
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: false
          run-install: false
          pixi-bin-path: ${{ runner.temp }}/pixi/bin/pixi
      - name: Update lockfiles
        run: |
          set -o pipefail
          pixi update --json --no-install | pixi exec pixi-diff-to-markdown >> diff.md
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update pixi lockfile
          title: Update pixi lockfile
          body-path: diff.md
          branch: update-pixi-${{ matrix.base }}
          base: ${{ matrix.base }}
          labels: pixi
          delete-branch: true
          add-paths: pixi.lock
